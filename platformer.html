// ║  HELPER — generates ground + side walls                     ║
// ║  Optional groundY parameter for levels taller than default  ║
// ╚══════════════════════════════════════════════════════════════╝

function makeBase(arenaW, groundY) {
  const gy = groundY !== undefined ? groundY : GROUND_Y;
  return [
    { x: 0, y: gy, w: arenaW, h: CONFIG.GROUND_H, isGround: true },
    { x: 0, y: 0, w: 16, h: gy },
    { x: arenaW - 16, y: 0, w: 16, h: gy },
  ];
}

// ║  GROUND SPLITTING — handles floor holes                     ║
// ╚══════════════════════════════════════════════════════════════╝

function splitGroundAroundHoles(groundPlat, holes) {
  if (!holes || holes.length === 0) return [{ ...groundPlat }];
  const sorted = [...holes].sort((a, b) => a.x - b.x);
  const segments = [];
  let curX = groundPlat.x;
  for (const hole of sorted) {
    if (hole.x > curX) {
      segments.push({ x: curX, y: groundPlat.y, w: hole.x - curX, h: groundPlat.h, isGround: true });
    }
    curX = hole.x + hole.w;
  }
  const endX = groundPlat.x + groundPlat.w;
  if (curX < endX) {
    segments.push({ x: curX, y: groundPlat.y, w: endX - curX, h: groundPlat.h, isGround: true });
  }
  return segments;
}

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
canvas.width  = CONFIG.VIEW_W;
canvas.height = CONFIG.VIEW_H;

let mouseX = 0, mouseY = 0;
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (CONFIG.VIEW_W / rect.width);
  mouseY = (e.clientY - rect.top)  * (CONFIG.VIEW_H / rect.height);
});

function isOverRestartBtn() {
  return mouseX >= CONFIG.RESTART_BTN_X && mouseX <= CONFIG.RESTART_BTN_X + CONFIG.RESTART_BTN_W &&
         mouseY >= CONFIG.RESTART_BTN_Y && mouseY <= CONFIG.RESTART_BTN_Y + CONFIG.RESTART_BTN_H;
}

canvas.addEventListener('click', () => {
  if ((gameState === 'playing' || gameState === 'transition') && isOverRestartBtn()) {
    loadLevel(currentLevel); return;
  }
  if (gameState === 'start') { gameState = 'playing'; canvas.style.cursor = 'default'; }
  canvas.focus();
});
canvas.setAttribute('tabindex', '0');

const camera = { x: 0, y: 0 };

function updateCamera() {
  // Horizontal
  const targetX = player.x + player.w / 2 - CONFIG.VIEW_W / 2;
  camera.x += (targetX - camera.x) * 0.08;
  camera.x = Math.max(0, Math.min(camera.x, arenaW - CONFIG.VIEW_W));
  // Vertical (only for levels taller than viewport)
  const maxCamY = levelH - CONFIG.VIEW_H;
  if (maxCamY > 0) {
    const targetY = player.y + player.h / 2 - CONFIG.VIEW_H / 2;
    camera.y += (targetY - camera.y) * 0.08;
    camera.y = Math.max(0, Math.min(camera.y, maxCamY));
  } else {
    camera.y = 0;
  }
}

  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space',' '].includes(e.key) || e.code === 'Space') e.preventDefault();
  if (!keys[e.code]) {
    if (e.code === 'Space') jumpPressedThisFrame  = true;
    if (e.code === 'KeyW')  dashPressedThisFrame   = true;
    if (e.code === 'KeyR')  hitPressedThisFrame    = true;
    if (e.code === 'KeyE')  shootPressedThisFrame  = true;
  }
  keys[e.code] = true;
});
window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
  if (e.code === 'Space') jumpReleasedThisFrame = true;
});


// ╔══════════════════════════════════════════════════════════════╗
// ║  PLAYER STATE                                               ║
// ╚══════════════════════════════════════════════════════════════╝

const player = {
  x: 0, y: 0, w: CONFIG.PLAYER_W, h: CONFIG.PLAYER_H,
  vx: 0, vy: 0, grounded: false,
  coyoteTimer: 0, jumpBufferTimer: 0,
  jumping: false, facingRight: true,
  airCharges: 1,
  dashTimer: 0, dashCooldownTimer: 0, dashDirX: 0,
  hitActiveTimer: 0, hitCooldownTimer: 0,
  hitDir: 'right', hitKnockbackDone: false, hitSpikeBounceDone: false, hitEnemyIds: null,
  ghostTimer: 0, safeX: 0, safeY: 0,
  hp: CONFIG.MAX_HP, invTimer: 0,
  lastGroundedX: 0, lastGroundedY: 0,
  squashX: 1, squashY: 1, landTimer: 0, dashTrails: [],
  shots: CONFIG.MAX_SHOTS, shotCooldownTimer: 0, shotHoverTimer: 0,
  bufferedJump: false, bufferedDash: false,
  onTriangle: false, triangleFacing: null,
  onGroundedPlat: false,
  // Animation
  animFrame: 0,    // current frame index (0–7)
  animTimer: 0,    // counts up each game frame, resets at ANIM_SPEED
};
let spawnX = 0, spawnY = 0;


// ╔══════════════════════════════════════════════════════════════╗
// ║  ENEMY HELPERS                                              ║
// ╚══════════════════════════════════════════════════════════════╝

function resetEnemies() {
  enemyList = enemyInitData.map(e => ({
    x: e.x, y: e.y, w: CONFIG.ENEMY_W, h: CONFIG.ENEMY_H,
    dir: 1, hp: CONFIG.ENEMY_MAX_HP, active: true,
  }));
}

function hasGroundAt(checkX, feetY) {
  for (const plat of platforms) {
    if (!isSolid(plat)) continue;
    if (feetY >= plat.y - 1 && feetY <= plat.y + 3 && checkX >= plat.x && checkX <= plat.x + plat.w) return true;
  }
  return false;
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  ORB EFFECT APPLICATION                                     ║
// ║  Called when an orb is hit (melee) or shot (projectile).    ║
// ║  givesBounce = true when hit from above or shot.            ║
// ╚══════════════════════════════════════════════════════════════╝

function applyOrbEffect(orb, givesBounce) {
  const t = orb.type;

  // Helper: when any orb launches the player upward, prevent the coyote timer
  // or jump buffer from firing a stacked jump on the next frame.
  function clearLaunchState() {
    player.grounded = false;
    player.coyoteTimer = 0;
    player.jumpBufferTimer = 0;
  }

  // Boost — vertical launch
  if (t === 'Boost1' || t === 'Boost2' || t === 'Boost3') {
    const h = { Boost1: 200, Boost2: 350, Boost3: 500 };
    player.vy = -Math.sqrt(2 * CONFIG.GRAVITY * h[t]);
    player.jumping = true;
    clearLaunchState();
    player.squashX = 0.75; player.squashY = 1.3;
    return;
  }

  // SetAir (bouncing)
  if (t === 'SetAir1' || t === 'SetAir2' || t === 'SetAir3') {
    const v = { SetAir1: 1, SetAir2: 2, SetAir3: 3 };
    player.airCharges = v[t];
    if (givesBounce) { player.vy = CONFIG.DOT_BOUNCE; player.jumping = false; clearLaunchState(); player.squashX = 1.2; player.squashY = 0.8; }
    return;
  }

  // AddAir (bouncing)
  if (t === 'AddAir1' || t === 'AddAir2' || t === 'AddAir3') {
    const v = { AddAir1: 1, AddAir2: 2, AddAir3: 3 };
    player.airCharges += v[t];
    if (givesBounce) { player.vy = CONFIG.DOT_BOUNCE; player.jumping = false; clearLaunchState(); player.squashX = 1.2; player.squashY = 0.8; }
    return;
  }

  // SetAir NoBounce
  if (t === 'SetAir1NB' || t === 'SetAir2NB' || t === 'SetAir3NB') {
    const v = { SetAir1NB: 1, SetAir2NB: 2, SetAir3NB: 3 };
    player.airCharges = v[t];
    return;
  }

  // AddAir NoBounce
  if (t === 'AddAir1NB' || t === 'AddAir2NB' || t === 'AddAir3NB') {
    const v = { AddAir1NB: 1, AddAir2NB: 2, AddAir3NB: 3 };
    player.airCharges += v[t];
    return;
  }

  // Ghosting
  if (t === 'Ghosting') {
    player.airCharges = 1;
    if (givesBounce) { player.vy = CONFIG.DOT_BOUNCE; player.jumping = false; clearLaunchState(); player.squashX = 1.2; player.squashY = 0.8; }
    player.ghostTimer = CONFIG.GHOST_DURATION;
    return;
  }

  // NoGhosting
  if (t === 'NoGhosting') {
    if (givesBounce) { player.vy = CONFIG.DOT_BOUNCE; player.jumping = false; clearLaunchState(); player.squashX = 1.2; player.squashY = 0.8; }
    player.ghostTimer = 0;
    return;
  }

  // SlowMo
  if (t === 'SlowMo') {
    if (givesBounce) { player.vy = CONFIG.DOT_BOUNCE; player.jumping = false; clearLaunchState(); player.squashX = 1.2; player.squashY = 0.8; }
    slowRealTimeLeft = orb.slowDuration || CONFIG.SLOW_DURATION_MS;
    slowRealTimeTotal = slowRealTimeLeft;
    timeScale = CONFIG.SLOW_SCALE;
    return;
  }

  // Bullet orbs — add shots to player
  if (t === 'Bullet1' || t === 'Bullet2' || t === 'Bullet3') {
    const v = { Bullet1: 1, Bullet2: 2, Bullet3: 3 };
    player.shots += v[t];
    return;
  }

  // Teleport — move player to orb center, do NOT change air
  if (t === 'Teleport') {
    player.x = orb.x - player.w / 2;
    player.y = orb.y - player.h / 2;
    player.vx = 0;
    player.vy = 0;
    clearLaunchState();
    return;
  }
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  FINISH CRITERIA + SHOOTING GATE                            ║
// ╚══════════════════════════════════════════════════════════════╝

function canFinish() {
  for (const cp of checkpointObjects) { if (!cp.cleared) return false; }
  const criteria = LEVELS[currentLevel].finishCriteria || 'default';
  if (criteria === 'killAll') {
    for (const e of enemyList) { if (e.active) return false; }
  } else if (criteria === 'activateAllOrbs') {
    if (orbsActivated.size < orbObjects.length) return false;
  }
  return true;
}

function tryAdvanceLevel() {
  if (canFinish()) { advanceLevel(); return true; }
  return false;
}

function shootingUnlocked() {
  return currentLevel >= CONFIG.SHOOT_UNLOCK_LEVEL;
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  LEVEL LOADING                                              ║
// ╚══════════════════════════════════════════════════════════════╝

function loadLevel(n) {
  if (n < 0 || n >= LEVELS.length) return;
  currentLevel = n;
  const lvl = LEVELS[n];

  arenaW       = lvl.arenaW;
  levelH       = lvl.levelH || CONFIG.VIEW_H;
  levelGroundY = levelH - CONFIG.GROUND_H;
  levelMaxHP   = lvl.hp !== undefined ? lvl.hp : CONFIG.MAX_HP;
  spawnX       = lvl.spawnX;
  spawnY       = lvl.spawnY;

  // Build platform list (split ground around holes)
  platforms = [];
  for (const p of lvl.platforms) {
    if (p.isGround) platforms.push(...splitGroundAroundHoles(p, lvl.floorHoles));
    else platforms.push({ ...p });
  }

  // Moving platforms — also added to platforms for collision
  movingPlatList = (lvl.movingPlatforms || []).map(mp => {
    const plat = { x: mp.x1, y: mp.y1, w: mp.w, h: mp.h, isMoving: true, ghostable: mp.ghostable || false };
    platforms.push(plat);
    const dx = mp.x2 - mp.x1, dy = mp.y2 - mp.y1;
    return { plat, x1: mp.x1, y1: mp.y1, x2: mp.x2, y2: mp.y2, speed: mp.speed, dist: Math.sqrt(dx*dx + dy*dy) || 1, progress: 0, direction: 1 };
  });

  floorHoleList = (lvl.floorHoles || []).map(h => ({ x: h.x, y: levelGroundY, w: h.w, h: CONFIG.GROUND_H }));
  spikeList     = (lvl.spikeZones || []).map(sz => ({ x: sz.x, y: sz.y, w: sz.w, h: sz.h }));

  orbObjects = (lvl.orbs || []).map(o => ({
    x: o.x, y: o.y, type: o.type, radius: CONFIG.ORB_RADIUS, active: true,
    respawns:     o.respawns !== undefined ? o.respawns : true,
    respawnTime:  o.respawnTime !== undefined ? o.respawnTime : CONFIG.ORB_RESPAWN_TIME,
    respawnTimer: 0,
    slowDuration: o.slowDuration !== undefined ? o.slowDuration : CONFIG.SLOW_DURATION_MS,
  }));
  orbsActivated = new Set();

  finishOrb       = { x: lvl.finishX, y: lvl.finishY, radius: 10, active: true };
  enemyInitData   = (lvl.enemies || []).map(e => ({ x: e.x, y: e.y }));
  resetEnemies();
  projectileList  = [];

  checkpointObjects  = (lvl.checkpoints || []).map(cp => ({ x: cp.x, y: cp.y, radius: CONFIG.ORB_RADIUS, cleared: false }));
  triangleBlockList  = (lvl.triangleBlocks || []).map(tb => ({ ...tb }));

  slowRealTimeLeft = 0; slowRealTimeTotal = 0; timeScale = 1.0;
  respawn();
  camera.x = Math.max(0, Math.min(spawnX - CONFIG.VIEW_W / 2, arenaW - CONFIG.VIEW_W));
  camera.y = 0;
  gameState = 'start';
  canvas.style.cursor = 'pointer';
  if (window.parent !== window) window.parent.postMessage({ type: 'levelLoaded', level: n }, '*');
}

window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'loadLevel' && typeof e.data.level === 'number') loadLevel(e.data.level);
});


// ╔══════════════════════════════════════════════════════════════╗
// ║  UTILITY FUNCTIONS                                          ║
// ╚══════════════════════════════════════════════════════════════╝

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function orbToBox(o) {
  return { x: o.x - o.radius, y: o.y - o.radius, w: o.radius * 2, h: o.radius * 2 };
}

function isSolid(plat) {
  if (plat.isGround) return true;
  if (plat.ghostable && player.ghostTimer > 0) return false;
  return true;
}

function isInsideGhostable() {
  for (const plat of platforms) {
    if (plat.ghostable && rectsOverlap(player, plat)) return true;
  }
  return false;
}

// Returns the AABB for a projectile based on its travel direction
function bulletBox(p) {
  const isHoriz = (p.dy === 0);
  const bw = isHoriz ? CONFIG.BULLET_W : CONFIG.BULLET_H;
  const bh = isHoriz ? CONFIG.BULLET_H : CONFIG.BULLET_W;
  return { x: p.x - bw / 2, y: p.y - bh / 2, w: bw, h: bh };
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  RESPAWN + DAMAGE                                           ║
// ╚══════════════════════════════════════════════════════════════╝

function respawn() {
  player.x = spawnX; player.y = spawnY;
  player.vx = 0; player.vy = 0;
  player.hp = levelMaxHP; player.invTimer = 0;
  player.airCharges = 1;
  player.dashTimer = 0; player.dashCooldownTimer = 0;
  player.ghostTimer = 0;
  player.hitActiveTimer = 0; player.hitCooldownTimer = 0;
  player.grounded = false; player.jumping = false;
  player.lastGroundedX = spawnX; player.lastGroundedY = spawnY;
  player.safeX = spawnX; player.safeY = spawnY;
  player.squashX = 1; player.squashY = 1; player.dashTrails = [];
  player.shots = CONFIG.MAX_SHOTS; player.shotCooldownTimer = 0;
  player.shotHoverTimer = 0;
  player.bufferedJump = false; player.bufferedDash = false;
  player.onTriangle = false; player.triangleFacing = null;
  player.onGroundedPlat = false;
  player.animFrame = 0; player.animTimer = 0;
  resetEnemies();
  projectileList = [];
}

function takeDamage(amount) {
  if (player.invTimer > 0) return;
  player.hp -= amount;
  if (player.hp <= 0) { respawn(); return; }
  player.x = player.lastGroundedX; player.y = player.lastGroundedY;
  player.vx = 0; player.vy = 0; player.dashTimer = 0;
  player.invTimer = CONFIG.INVINCIBILITY_FRAMES;
}

function takeEnemyDamage(enemyCenterX) {
  if (player.invTimer > 0) return;
  player.hp -= 1;
  if (player.hp <= 0) { respawn(); return; }
  const pushDir = (player.x + player.w / 2) > enemyCenterX ? 1 : -1;
  player.vx = pushDir * CONFIG.ENEMY_KNOCKBACK;
  player.vy = CONFIG.ENEMY_KNOCKBACK_Y;
  player.invTimer = CONFIG.INVINCIBILITY_FRAMES;
}

function advanceLevel() {
  const next = (currentLevel + 1) % LEVELS.length;
  loadLevel(next);
  gameState = 'transition'; transitionTimer = TRANSITION_TOTAL; canvas.style.cursor = 'default';
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  COLLISION — platforms, triangles                           ║
// ╚══════════════════════════════════════════════════════════════╝

function resolveCollisions() {
  player.grounded = false;
  player.onGroundedPlat = false;

  // Horizontal
  player.x += player.vx;
  for (const plat of platforms) {
    if (!isSolid(plat) || !rectsOverlap(player, plat)) continue;
    if (player.vx > 0) { player.x = plat.x - player.w; player.vx = 0; if (player.dashTimer > 0) player.dashTimer = 0; }
    else if (player.vx < 0) { player.x = plat.x + plat.w; player.vx = 0; if (player.dashTimer > 0) player.dashTimer = 0; }
  }

  // Vertical
  player.y += player.vy;
  for (const plat of platforms) {
    if (!isSolid(plat) || !rectsOverlap(player, plat)) continue;
    if (player.vy > 0) {
      player.y = plat.y - player.h;
      if (player.vy > 4) { player.squashX = 1.3; player.squashY = 0.7; player.landTimer = 8; }
      player.vy = 0; player.grounded = true; player.jumping = false;
      if (plat.grounded) player.onGroundedPlat = true;
    } else if (player.vy < 0) {
      player.y = plat.y + plat.h; player.vy = 0;
    }
  }
}

function resolveTriangleCollisions() {
  player.onTriangle = false;
  player.triangleFacing = null;

  for (const tri of triangleBlockList) {
    const pcx = player.x + player.w / 2;
    const pb  = player.y + player.h;
    if (player.x + player.w <= tri.x || player.x >= tri.x + tri.w || pb <= tri.y || player.y >= tri.y + tri.h) continue;

    // Compute slope surface Y at player center
    let surfaceY;
    if (tri.facing === 'left') {
      const t = Math.max(0, Math.min(1, (pcx - tri.x) / tri.w));
      surfaceY = tri.y + tri.h - t * tri.h;
    } else {
      const t = Math.max(0, Math.min(1, (pcx - tri.x) / tri.w));
      surfaceY = tri.y + t * tri.h;
    }

    // Push player onto slope
    if (pb > surfaceY && pb <= tri.y + tri.h + 6) {
      player.y = surfaceY - player.h;
      player.grounded = true; player.jumping = false;
      player.onTriangle = true; player.triangleFacing = tri.facing;

      // Slide — fixed speed along the slope surface (both vx AND vy)
      // This prevents jitter: no separate gravity needed, player follows slope exactly.
      const slideSpeed = CONFIG.MAX_MOVE_SPEED * 1.5;
      const slopeRatio = tri.h / tri.w;  // vertical rise per horizontal unit
      if (tri.facing === 'left') {
        player.vx = -slideSpeed;
        player.vy = slideSpeed * slopeRatio;
      } else {
        player.vx = slideSpeed;
        player.vy = slideSpeed * slopeRatio;
      }

      // Suppress any jump or coyote — player cannot escape the slide by jumping
      player.coyoteTimer = 0;
      player.jumpBufferTimer = 0;
    }

    // Vertical wall collision
    if (tri.facing === 'left') {
      if (player.x + player.w > tri.x + tri.w && player.vx < 0 && pb > tri.y && player.y < tri.y + tri.h) {
        player.x = tri.x + tri.w; player.vx = 0; if (player.dashTimer > 0) player.dashTimer = 0;
      }
    } else {
      if (player.x < tri.x && player.vx > 0 && pb > tri.y && player.y < tri.y + tri.h) {
        player.x = tri.x - player.w; player.vx = 0; if (player.dashTimer > 0) player.dashTimer = 0;
      }
    }
  }
}

function computeHitBox(dir) {
  const range = CONFIG.HIT_RANGE, thick = CONFIG.HIT_THICKNESS;
  switch (dir) {
    case 'right': return { x: player.x + player.w, y: player.y + player.h/2 - thick/2, w: range, h: thick };
    case 'left':  return { x: player.x - range,    y: player.y + player.h/2 - thick/2, w: range, h: thick };
    case 'up':    return { x: player.x + player.w/2 - thick/2, y: player.y - range, w: thick, h: range };
    case 'down':  return { x: player.x + player.w/2 - thick/2, y: player.y + player.h, w: thick, h: range };
  }
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  MOVING PLATFORM UPDATE                                     ║
// ╚══════════════════════════════════════════════════════════════╝

function updateMovingPlatforms() {
  for (const mp of movingPlatList) {
    const oldX = mp.plat.x, oldY = mp.plat.y;
    const playerBottom = player.y + player.h;
    const isOn = player.grounded && playerBottom >= oldY - 2 && playerBottom <= oldY + 2 &&
                 player.x + player.w > oldX && player.x < oldX + mp.plat.w;

    mp.progress += (mp.speed / mp.dist) * mp.direction;
    if (mp.progress >= 1) { mp.progress = 1; mp.direction = -1; }
    else if (mp.progress <= 0) { mp.progress = 0; mp.direction = 1; }

    mp.plat.x = mp.x1 + (mp.x2 - mp.x1) * mp.progress;
    mp.plat.y = mp.y1 + (mp.y2 - mp.y1) * mp.progress;

    if (isOn) { player.x += mp.plat.x - oldX; player.y += mp.plat.y - oldY; }
  }
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  PROJECTILE UPDATE                                          ║
// ║  Handles wall/enemy/orb/checkpoint/finish/bullet collisions ║
// ╚══════════════════════════════════════════════════════════════╝

function updateProjectiles() {
  for (let i = projectileList.length - 1; i >= 0; i--) {
    const p = projectileList[i];
    p.x += p.dx; p.y += p.dy;

    // Out of bounds
    if (p.x < -50 || p.x > arenaW + 50 || p.y < -50 || p.y > levelH + 50) {
      projectileList.splice(i, 1); continue;
    }

    const bb = bulletBox(p);

    // Wall collision (non-ghostable solid platforms)
    let hitWall = false;
    for (const plat of platforms) {
      if (plat.ghostable) continue;
      if (rectsOverlap(bb, plat)) { hitWall = true; break; }
    }
    if (hitWall) { projectileList.splice(i, 1); continue; }

    // Enemy collision
    let hitEnemy = false;
    for (const enemy of enemyList) {
      if (!enemy.active) continue;
      if (rectsOverlap(bb, enemy)) {
        enemy.hp -= CONFIG.SHOT_ENEMY_DAMAGE;
        if (enemy.hp <= 0) { enemy.active = false; }
        hitEnemy = true; break;
      }
    }
    if (hitEnemy) { projectileList.splice(i, 1); continue; }

    // Orb collision
    let hitOrb = false;
    for (let oi = 0; oi < orbObjects.length; oi++) {
      const orb = orbObjects[oi];
      if (!orb.active) continue;
      if (rectsOverlap(bb, orbToBox(orb))) {
        orb.active = false;
        orb.respawnTimer = orb.respawnTime;
        orbsActivated.add(oi);
        applyOrbEffect(orb, true);
        hitOrb = true; break;
      }
    }
    if (hitOrb) { projectileList.splice(i, 1); continue; }

    // Checkpoint collision
    let hitCP = false;
    for (const cp of checkpointObjects) {
      if (cp.cleared) continue;
      if (rectsOverlap(bb, orbToBox(cp))) { cp.cleared = true; hitCP = true; break; }
    }
    if (hitCP) { projectileList.splice(i, 1); continue; }

    // Finish orb collision
    if (finishOrb && finishOrb.active && rectsOverlap(bb, orbToBox(finishOrb))) {
      projectileList.splice(i, 1);
      tryAdvanceLevel(); return;
    }
  }
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  ENEMY UPDATE                                               ║
// ╚══════════════════════════════════════════════════════════════╝

function updateEnemies() {
  for (let i = 0; i < enemyList.length; i++) {
    const enemy = enemyList[i];
    if (!enemy.active) continue;
    const nextX = enemy.x + CONFIG.ENEMY_SPEED * enemy.dir;
    const feetY = enemy.y + enemy.h;
    const leadX = enemy.dir > 0 ? nextX + enemy.w : nextX;
    const groundBelow = hasGroundAt(leadX, feetY);
    const nextBox = { x: nextX, y: enemy.y, w: enemy.w, h: enemy.h };
    let hitsSpike = false;
    for (const sp of spikeList) { if (rectsOverlap(nextBox, sp)) { hitsSpike = true; break; } }
    const tooClose = Math.abs(nextX + enemy.w / 2 - spawnX) < CONFIG.ENEMY_SPAWN_DIST;
    if (!groundBelow || hitsSpike || tooClose) enemy.dir *= -1;
    else enemy.x = nextX;
    if (player.invTimer <= 0 && rectsOverlap(player, enemy)) takeEnemyDamage(enemy.x + enemy.w / 2);
  }
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  MAIN UPDATE LOOP                                           ║
// ╚══════════════════════════════════════════════════════════════╝

function update() {
  if (gameState === 'transition') { transitionTimer--; if (transitionTimer <= 0) gameState = 'playing'; }
  if (gameState !== 'playing' && gameState !== 'transition') return;

  const moveLeft = keys['ArrowLeft'], moveRight = keys['ArrowRight'];
  const holdUp   = keys['ArrowUp'],   holdDown  = keys['ArrowDown'];

  if (player.invTimer > 0) player.invTimer--;

  // Moving platforms (before player movement for carry)
  updateMovingPlatforms();

  // Ground resets air to 1 and saves safe position (triangles excluded)
  if (player.grounded && !player.onTriangle) {
    player.airCharges = 1;
    player.lastGroundedX = player.x;
    player.lastGroundedY = player.y;
  }

  // Shot hover
  if (player.shotHoverTimer > 0) {
    player.vy = 0;
    player.shotHoverTimer--;
    if (jumpPressedThisFrame) player.bufferedJump = true;
    if (dashPressedThisFrame) player.bufferedDash = true;
    if (player.shotHoverTimer <= 0) {
      if (player.bufferedJump) { jumpPressedThisFrame = true; player.jumpBufferTimer = CONFIG.JUMP_BUFFER; }
      if (player.bufferedDash) dashPressedThisFrame = true;
      player.bufferedJump = false; player.bufferedDash = false;
    }
  }

  const movementLocked = player.shotHoverTimer > 0;
  const onTri = player.onTriangle;
  const onGP  = player.onGroundedPlat;

  // --- Movement ---
  if (player.dashTimer > 0) {
    player.vx = CONFIG.DASH_SPEED * player.dashDirX;
    player.vy = 0;
    if (player.dashTimer % 2 === 0) player.dashTrails.push({ x: player.x, y: player.y, alpha: 0.6 });
    player.dashTimer--;
  } else if (!movementLocked && !onTri) {
    if (moveLeft && !moveRight)      { player.vx -= CONFIG.MOVE_ACCEL; if (player.vx < -CONFIG.MAX_MOVE_SPEED) player.vx = -CONFIG.MAX_MOVE_SPEED; player.facingRight = false; }
    else if (moveRight && !moveLeft) { player.vx += CONFIG.MOVE_ACCEL; if (player.vx >  CONFIG.MAX_MOVE_SPEED) player.vx =  CONFIG.MAX_MOVE_SPEED; player.facingRight = true; }
    else { player.vx *= CONFIG.MOVE_DECEL; if (Math.abs(player.vx) < 0.1) player.vx = 0; }
    if (player.shotHoverTimer <= 0) {
      player.vy += CONFIG.GRAVITY;
      if (player.vy > CONFIG.TERMINAL_VELOCITY) player.vy = CONFIG.TERMINAL_VELOCITY;
    }
  } else if (onTri && player.dashTimer <= 0) {
    // On triangle: do nothing here. The collision resolver sets vx and vy
    // along the slope each frame for smooth sliding. No gravity needed.
  } else {
    player.vx *= CONFIG.MOVE_DECEL;
    if (Math.abs(player.vx) < 0.1) player.vx = 0;
  }

  // --- Dash ---
  if (player.dashCooldownTimer > 0) player.dashCooldownTimer--;
  if (!movementLocked && dashPressedThisFrame && player.dashTimer <= 0 && player.dashCooldownTimer <= 0 && !onGP) {
    let dashAllowed = true;
    if (onTri) {
      const desiredDir = player.facingRight ? 1 : -1;
      if (player.triangleFacing === 'left'  && desiredDir > 0) dashAllowed = false;
      if (player.triangleFacing === 'right' && desiredDir < 0) dashAllowed = false;
    }
    if (dashAllowed) {
      const isGrounded = player.grounded || player.coyoteTimer > 0;
      const canDash = isGrounded || player.airCharges > 0;
      if (canDash) {
        player.dashTimer = CONFIG.DASH_DURATION;
        player.dashCooldownTimer = CONFIG.DASH_COOLDOWN;
        player.dashDirX = player.facingRight ? 1 : -1;
        player.vy = 0; player.jumping = false;
        if (!isGrounded) player.airCharges--;
        else { player.coyoteTimer = 0; player.grounded = false; }
        player.squashX = 1.4; player.squashY = 0.7;
      }
    }
  }

  // --- Coyote + jump buffer ---
  if (player.grounded) player.coyoteTimer = CONFIG.COYOTE_TIME;
  else if (player.coyoteTimer > 0) player.coyoteTimer--;

  // Jump — blocked on triangle and grounded platforms
  if (jumpPressedThisFrame && !movementLocked && !onTri && !onGP) player.jumpBufferTimer = CONFIG.JUMP_BUFFER;
  if (player.jumpBufferTimer > 0) player.jumpBufferTimer--;

  if (player.dashTimer <= 0 && !movementLocked && !onTri && !onGP) {
    const canGJ = player.coyoteTimer > 0;
    const canAJ = !canGJ && player.airCharges > 0;
    if ((canGJ || canAJ) && player.jumpBufferTimer > 0) {
      player.vy = CONFIG.JUMP_VELOCITY;
      player.grounded = false; player.coyoteTimer = 0; player.jumpBufferTimer = 0;
      player.jumping = true;
      if (canAJ) player.airCharges--;
      player.squashX = 0.75; player.squashY = 1.3;
    }
  }

  if (jumpReleasedThisFrame && player.jumping && player.vy < 0) {
    player.vy *= CONFIG.JUMP_CUT_MULTIPLIER; player.jumping = false;
  }

  // --- Shooting ---
  if (player.shotCooldownTimer > 0) player.shotCooldownTimer--;
  if (shootingUnlocked() && shootPressedThisFrame && player.shotCooldownTimer <= 0 && player.shots > 0) {
    let shotDir;
    if (holdUp) shotDir = 'up'; else if (holdDown) shotDir = 'down';
    else shotDir = player.facingRight ? 'right' : 'left';

    let dx = 0, dy = 0;
    const spd = CONFIG.SHOT_SPEED;
    if (shotDir === 'right') dx = spd; else if (shotDir === 'left') dx = -spd;
    else if (shotDir === 'up') dy = -spd; else if (shotDir === 'down') dy = spd;

    projectileList.push({ x: player.x + player.w / 2, y: player.y + player.h / 2, dx, dy });
    player.shots--;
    player.shotCooldownTimer = CONFIG.SHOT_COOLDOWN;

    if (shotDir === 'left' || shotDir === 'right') {
      player.vy = 0;
      player.shotHoverTimer = CONFIG.SHOT_HOVER_FRAMES;
      player.vx += (shotDir === 'right' ? -CONFIG.SHOT_KNOCKBACK : CONFIG.SHOT_KNOCKBACK);
      player.bufferedJump = false; player.bufferedDash = false;
    }
  }

  // --- Melee hit ---
  if (player.hitCooldownTimer > 0) player.hitCooldownTimer--;
  if (hitPressedThisFrame && player.hitCooldownTimer <= 0) {
    if (holdUp) player.hitDir = 'up'; else if (holdDown) player.hitDir = 'down';
    else player.hitDir = player.facingRight ? 'right' : 'left';
    player.hitActiveTimer = CONFIG.HIT_ACTIVE_FRAMES;
    player.hitCooldownTimer = CONFIG.HIT_COOLDOWN;
    player.hitKnockbackDone = false; player.hitSpikeBounceDone = false;
    player.hitEnemyIds = new Set();
  }

  if (player.hitActiveTimer > 0) {
    const hitBox = computeHitBox(player.hitDir);

    // Wall knockback
    if (!player.hitKnockbackDone) {
      for (const plat of platforms) {
        if (rectsOverlap(hitBox, plat)) {
          const kb = CONFIG.HIT_KNOCKBACK;
          switch (player.hitDir) {
            case 'right': player.vx -= kb; break; case 'left': player.vx += kb; break;
            case 'up':    player.vy += kb; break; case 'down': player.vy -= kb; break;
          }
          player.hitKnockbackDone = true; break;
        }
      }
    }

    // Orb hits
    for (let oi = 0; oi < orbObjects.length; oi++) {
      const orb = orbObjects[oi];
      if (!orb.active || !rectsOverlap(hitBox, orbToBox(orb))) continue;
      orb.active = false; orb.respawnTimer = orb.respawnTime;
      orbsActivated.add(oi);
      applyOrbEffect(orb, player.hitDir === 'down');
    }

    // Checkpoint hits
    for (const cp of checkpointObjects) {
      if (!cp.cleared && rectsOverlap(hitBox, orbToBox(cp))) cp.cleared = true;
    }

    // Enemy hits
    for (let i = 0; i < enemyList.length; i++) {
      const enemy = enemyList[i];
      if (!enemy.active || (player.hitEnemyIds && player.hitEnemyIds.has(i)) || !rectsOverlap(hitBox, enemy)) continue;
      enemy.hp--;
      if (enemy.hp <= 0) enemy.active = false;
      if (player.hitEnemyIds) player.hitEnemyIds.add(i);
      if (player.hitDir === 'down') {
        player.vy = CONFIG.DOT_BOUNCE; player.jumping = false;
        player.grounded = false; player.coyoteTimer = 0; player.jumpBufferTimer = 0;
        player.airCharges = 1; player.squashX = 1.2; player.squashY = 0.8;
      }
    }

    // Bullet bounce — hitting a HORIZONTAL bullet from above bounces the player and sets air to 2
    // (vertical bullets excluded to prevent accidental self-bounce on own shots)
    if (player.hitDir === 'down') {
      for (const p of projectileList) {
        if (p.dy !== 0) continue;  // skip vertical bullets
        if (rectsOverlap(hitBox, bulletBox(p))) {
          player.vy = CONFIG.DOT_BOUNCE; player.jumping = false;
          player.grounded = false; player.coyoteTimer = 0; player.jumpBufferTimer = 0;
          player.airCharges = 2; player.squashX = 1.2; player.squashY = 0.8;
          break;  // bullet is not consumed
        }
      }
    }

    // Finish orb hit
    if (finishOrb && finishOrb.active && rectsOverlap(hitBox, orbToBox(finishOrb))) {
      if (tryAdvanceLevel()) return;
    }

    // Spike bounce
    if (!player.hitSpikeBounceDone && player.hitDir === 'down') {
      for (const sp of spikeList) {
        if (rectsOverlap(hitBox, sp)) {
          player.vy = CONFIG.DOT_BOUNCE; player.jumping = false;
          player.grounded = false; player.coyoteTimer = 0; player.jumpBufferTimer = 0;
          player.airCharges = 1;
          player.squashX = 1.2; player.squashY = 0.8; player.hitSpikeBounceDone = true; break;
        }
      }
    }

    player.hitActiveTimer--;
  }

  // Orb respawn
  for (const orb of orbObjects) {
    if (!orb.active && orb.respawns) { orb.respawnTimer--; if (orb.respawnTimer <= 0) orb.active = true; }
  }

  // Physics + AI
  resolveCollisions();
  resolveTriangleCollisions();
  updateEnemies();
  updateProjectiles();

  // Bullet orb body touch (Bullet1/2/3 activate on touch)
  for (let oi = 0; oi < orbObjects.length; oi++) {
    const orb = orbObjects[oi];
    if (!orb.active) continue;
    if (orb.type !== 'Bullet1' && orb.type !== 'Bullet2' && orb.type !== 'Bullet3') continue;
    if (rectsOverlap(player, orbToBox(orb))) {
      orb.active = false; orb.respawnTimer = orb.respawnTime;
      orbsActivated.add(oi);
      applyOrbEffect(orb, false);
    }
  }

  // Checkpoint body touch
  for (const cp of checkpointObjects) {
    if (!cp.cleared && rectsOverlap(player, orbToBox(cp))) cp.cleared = true;
  }

  // Finish orb body touch
  if (finishOrb && finishOrb.active && rectsOverlap(player, orbToBox(finishOrb))) {
    if (tryAdvanceLevel()) return;
  }

  // Spike body contact
  for (const sp of spikeList) {
    if (player.invTimer <= 0 && rectsOverlap(player, sp)) { takeDamage(1); break; }
  }

  // Fall off bottom
  if (player.y > levelH + 60) takeDamage(CONFIG.FALL_DAMAGE);

  // Ghosting logic
  if (player.ghostTimer > 0) {
    if (!isInsideGhostable()) { player.safeX = player.x; player.safeY = player.y; }
    player.ghostTimer--;
    if (player.ghostTimer <= 0 && isInsideGhostable()) {
      player.x = player.safeX; player.y = player.safeY;
      player.vx = 0; player.vy = 0; player.dashTimer = 0;
    }
  } else {
    player.safeX = player.x; player.safeY = player.y;
  }

  // Sprite animation
  // Cycle walk frames when there's horizontal movement; idle (frame 0) otherwise
  const hasHorizMove = Math.abs(player.vx) > 0.3;
  if (hasHorizMove) {
    player.animTimer++;
    if (player.animTimer >= ANIM_SPEED) {
      player.animTimer = 0;
      player.animFrame = (player.animFrame + 1) % SPRITE_FRAMES;
    }
  } else {
    player.animFrame = 0;
    player.animTimer = 0;
  }

  // Visual decay
  player.squashX += (1 - player.squashX) * 0.25;
  player.squashY += (1 - player.squashY) * 0.25;
  if (player.landTimer > 0) player.landTimer--;
  for (let i = player.dashTrails.length - 1; i >= 0; i--) {
    player.dashTrails[i].alpha -= 0.08;
    if (player.dashTrails[i].alpha <= 0) player.dashTrails.splice(i, 1);
  }

  // Clear per-frame input flags
  jumpPressedThisFrame = false; jumpReleasedThisFrame = false;
  dashPressedThisFrame = false; hitPressedThisFrame = false;
  shootPressedThisFrame = false;
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  RENDER FUNCTIONS                                           ║
// ║  All world-space y values are offset by camera.y            ║
// ╚══════════════════════════════════════════════════════════════╝

function drawBackground() {
  ctx.fillStyle = CONFIG.BG_COLOR;
  ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
  if (timeScale < 1) { ctx.fillStyle = 'rgba(80,40,120,0.06)'; ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H); }
  ctx.strokeStyle = CONFIG.GRID_COLOR; ctx.lineWidth = 1;
  const gs = 40;
  const sX = Math.floor(camera.x / gs) * gs;
  for (let gx = sX; gx < camera.x + CONFIG.VIEW_W; gx += gs) {
    const sx = gx - camera.x; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, CONFIG.VIEW_H); ctx.stroke();
  }
  const sY = Math.floor(camera.y / gs) * gs;
  for (let gy = sY; gy < camera.y + CONFIG.VIEW_H; gy += gs) {
    const sy = gy - camera.y; ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(CONFIG.VIEW_W, sy); ctx.stroke();
  }
}

function drawPlatforms() {
  const ghosting = player.ghostTimer > 0;
  const shimmerPhase = Date.now() * 0.004;
  for (const plat of platforms) {
    const sx = plat.x - camera.x, sy = plat.y - camera.y;
    if (sx + plat.w < 0 || sx > CONFIG.VIEW_W || sy + plat.h < 0 || sy > CONFIG.VIEW_H) continue;

    // Body
    ctx.fillStyle = plat.isGround ? CONFIG.GROUND_COLOR : CONFIG.PLATFORM_COLOR;
    ctx.fillRect(sx, sy, plat.w, plat.h);

    // Top edge — dark purple for grounded platforms, otherwise standard
    if (plat.grounded) {
      ctx.fillStyle = CONFIG.GROUNDED_TOP;
    } else {
      ctx.fillStyle = plat.isGround ? CONFIG.GROUND_TOP : CONFIG.PLATFORM_TOP;
    }
    ctx.fillRect(sx, sy, plat.w, plat.isGround ? 3 : 2);

    // Ghost shimmer
    if (ghosting && plat.ghostable) {
      ctx.fillStyle = 'rgba(220,220,255,' + (0.08 + 0.06 * Math.sin(shimmerPhase + plat.x * 0.01)) + ')';
      ctx.fillRect(sx, sy, plat.w, plat.h);
      ctx.strokeStyle = 'rgba(220,220,255,' + (0.15 + 0.1 * Math.sin(shimmerPhase * 1.5)) + ')';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx + 0.5, sy + 0.5, plat.w - 1, plat.h - 1);
    }
  }
}

function drawFloorHoles() {
  for (const hole of floorHoleList) {
    const sx = hole.x - camera.x, sy = hole.y - camera.y;
    if (sx + hole.w < 0 || sx > CONFIG.VIEW_W) continue;
    ctx.fillStyle = '#050508'; ctx.fillRect(sx, sy, hole.w, hole.h);
    ctx.strokeStyle = 'rgba(200,50,50,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx, sy + hole.h);
    ctx.moveTo(sx + hole.w, sy); ctx.lineTo(sx + hole.w, sy + hole.h); ctx.stroke();
  }
}

function drawSpikes() {
  const triH = CONFIG.SPIKE_TRIANGLE_H, triW = 14;
  for (const sp of spikeList) {
    const sx = sp.x - camera.x, sy = sp.y - camera.y;
    if (sx + sp.w < 0 || sx > CONFIG.VIEW_W) continue;
    const baseY = sy + sp.h;
    const count = Math.floor(sp.w / triW);
    const startX = sx + (sp.w - count * triW) / 2;
    ctx.fillStyle = CONFIG.SPIKE_COLOR; ctx.strokeStyle = CONFIG.SPIKE_OUTLINE; ctx.lineWidth = 1;
    for (let i = 0; i < count; i++) {
      const tx = startX + i * triW;
      ctx.beginPath(); ctx.moveTo(tx, baseY); ctx.lineTo(tx + triW / 2, baseY - triH); ctx.lineTo(tx + triW, baseY);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }
  }
}

function drawTriangleBlocks() {
  for (const tri of triangleBlockList) {
    const sx = tri.x - camera.x, sy = tri.y - camera.y;
    if (sx + tri.w < 0 || sx > CONFIG.VIEW_W || sy + tri.h < 0 || sy > CONFIG.VIEW_H) continue;
    ctx.fillStyle = CONFIG.TRIANGLE_COLOR; ctx.strokeStyle = CONFIG.TRIANGLE_OUTLINE; ctx.lineWidth = 1.5;
    ctx.beginPath();
    if (tri.facing === 'left') { ctx.moveTo(sx, sy + tri.h); ctx.lineTo(sx + tri.w, sy + tri.h); ctx.lineTo(sx + tri.w, sy); }
    else { ctx.moveTo(sx, sy + tri.h); ctx.lineTo(sx + tri.w, sy + tri.h); ctx.lineTo(sx, sy); }
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }
}

function drawDashTrails() {
  for (const trail of player.dashTrails) {
    ctx.fillStyle = 'rgba(232,83,63,' + trail.alpha * 0.4 + ')';
    ctx.fillRect(trail.x - camera.x, trail.y - camera.y, player.w, player.h);
  }
}

function drawHitBox() {
  if (player.hitActiveTimer <= 0) return;
  const hb = computeHitBox(player.hitDir);
  const progress = player.hitActiveTimer / CONFIG.HIT_ACTIVE_FRAMES;
  const sx = hb.x - camera.x, sy = hb.y - camera.y;
  ctx.globalAlpha = progress; ctx.fillStyle = CONFIG.HIT_COLOR; ctx.fillRect(sx, sy, hb.w, hb.h);
  ctx.fillStyle = CONFIG.HIT_COLOR_FADE;
  const ex = 4 * progress; ctx.fillRect(sx - ex, sy - ex, hb.w + ex * 2, hb.h + ex * 2);
  ctx.globalAlpha = 1;
}

function drawProjectiles() {
  for (const p of projectileList) {
    const sx = p.x - camera.x, sy = p.y - camera.y;

    // Determine rotation angle based on travel direction
    // bullet.png is designed pointing RIGHT (0°)
    let angle = 0;
    if (p.dx < 0 && p.dy === 0) angle = Math.PI;        // left → 180°
    else if (p.dx === 0 && p.dy < 0) angle = -Math.PI / 2; // up → -90°
    else if (p.dx === 0 && p.dy > 0) angle = Math.PI / 2;  // down → 90°
    // dx > 0, dy === 0 → right → 0° (default)

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(angle);

    if (bulletImg.complete && bulletImg.naturalWidth > 0) {
      // Draw centered at origin (after translate+rotate)
      ctx.drawImage(bulletImg, -CONFIG.BULLET_W / 2, -CONFIG.BULLET_H / 2, CONFIG.BULLET_W, CONFIG.BULLET_H);
    } else {
      ctx.fillStyle = '#fff';
      ctx.fillRect(-CONFIG.BULLET_W / 2, -CONFIG.BULLET_H / 2, CONFIG.BULLET_W, CONFIG.BULLET_H);
    }

    ctx.restore();
  }
}

function drawPlayer() {
  const cx = player.x + player.w / 2 - camera.x;
  const cy = player.y + player.h / 2 - camera.y;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(player.squashX, player.squashY);

  // Invincibility flicker
  if (player.invTimer > 0 && Math.floor(player.invTimer / 4) % 2 === 0) ctx.globalAlpha = 0.3;

  // Ghost transparency
  if (player.ghostTimer > 0) {
    const fr = player.ghostTimer < 30 ? 4 : 0;
    if (fr > 0 && Math.floor(player.ghostTimer / fr) % 2 === 0) ctx.globalAlpha = 0.35;
    else ctx.globalAlpha = Math.min(ctx.globalAlpha || 1, 0.6);
  }

  // The spritesheet has the frog facing LEFT by default.
  // facingRight = true → mirror horizontally.
  if (player.facingRight) ctx.scale(-1, 1);

  // Draw the correct animation frame from the spritesheet
  const srcX = player.animFrame * SPRITE_FRAME_W;
  if (playerSprite.complete && playerSprite.naturalWidth > 0) {
    ctx.drawImage(
      playerSprite,
      srcX, 0, SPRITE_FRAME_W, SPRITE_FRAME_H,       // source rect
      -player.w / 2, -player.h / 2, player.w, player.h // dest rect (centered)
    );
  } else {
    // Fallback: colored rectangle if spritesheet hasn't loaded
    ctx.fillStyle = CONFIG.PLAYER_COLOR;
    ctx.fillRect(-player.w / 2, -player.h / 2, player.w, player.h);
    ctx.strokeStyle = CONFIG.PLAYER_OUTLINE; ctx.lineWidth = 1.5;
    ctx.strokeRect(-player.w / 2, -player.h / 2, player.w, player.h);
  }

  // Ghost tint overlay
  if (player.ghostTimer > 0) {
    ctx.fillStyle = 'rgba(200,200,255,0.15)';
    ctx.fillRect(-player.w / 2, -player.h / 2, player.w, player.h);
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawEnemies() {
  for (const enemy of enemyList) {
    if (!enemy.active) continue;
    const sx = enemy.x - camera.x, sy = enemy.y - camera.y;
    if (sx + enemy.w < 0 || sx > CONFIG.VIEW_W) continue;
    ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(sx + 2, sy + 2, enemy.w, enemy.h);
    ctx.fillStyle = CONFIG.ENEMY_COLOR; ctx.fillRect(sx, sy, enemy.w, enemy.h);
    ctx.strokeStyle = CONFIG.ENEMY_OUTLINE; ctx.lineWidth = 1; ctx.strokeRect(sx, sy, enemy.w, enemy.h);
    const ecx = sx + enemy.w / 2, ecy = sy + 10;
    ctx.fillStyle = '#cc4444';
    ctx.fillRect(ecx - 5 + enemy.dir, ecy - 1, 3, 3);
    ctx.fillRect(ecx + 3 + enemy.dir, ecy - 1, 3, 3);
    // Health bar
    const barW = enemy.w + 8, barX = sx - 4, barY = sy - 8;
    const hpRatio = enemy.hp / CONFIG.ENEMY_MAX_HP;
    ctx.fillStyle = '#111'; ctx.fillRect(barX, barY, barW, 3);
    ctx.fillStyle = enemy.hp === 3 ? '#44aa55' : enemy.hp === 2 ? '#ccaa33' : '#cc3333';
    ctx.fillRect(barX, barY, barW * hpRatio, 3);
  }
}

function drawOrbs() {
  const orbSize = CONFIG.ORB_RADIUS * 2, halfSize = CONFIG.ORB_RADIUS;
  for (const orb of orbObjects) {
    if (!orb.active) continue;
    const sx = orb.x - camera.x, sy = orb.y - camera.y;
    if (sx + halfSize + 4 < 0 || sx - halfSize - 4 > CONFIG.VIEW_W) continue;
    const img = orbImages[orb.type];
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.drawImage(img, sx - halfSize, sy - halfSize, orbSize, orbSize);
    } else {
      ctx.save(); ctx.beginPath(); ctx.arc(sx, sy, halfSize, 0, Math.PI * 2);
      ctx.fillStyle = '#555'; ctx.fill(); ctx.strokeStyle = '#888'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.restore();
    }
  }
}

function drawCheckpoints() {
  const orbSize = CONFIG.ORB_RADIUS * 2, halfSize = CONFIG.ORB_RADIUS;
  for (const cp of checkpointObjects) {
    const sx = cp.x - camera.x, sy = cp.y - camera.y;
    if (sx + halfSize + 4 < 0 || sx - halfSize - 4 > CONFIG.VIEW_W) continue;
    ctx.save();
    if (checkpointImg.complete && checkpointImg.naturalWidth > 0) {
      if (cp.cleared) ctx.globalAlpha = 0.5;
      ctx.drawImage(checkpointImg, sx - halfSize, sy - halfSize, orbSize, orbSize);
      if (cp.cleared) {
        ctx.globalAlpha = 1;
        ctx.beginPath(); ctx.arc(sx, sy, halfSize, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(50,200,80,0.3)'; ctx.fill();
        ctx.strokeStyle = '#44dd66'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(sx - 5, sy); ctx.lineTo(sx - 1, sy + 5); ctx.lineTo(sx + 7, sy - 5); ctx.stroke();
      }
    } else {
      ctx.beginPath(); ctx.arc(sx, sy, halfSize, 0, Math.PI * 2);
      ctx.fillStyle = cp.cleared ? '#44dd66' : '#ddaa22'; ctx.fill();
      ctx.strokeStyle = cp.cleared ? '#66ff88' : '#ffcc44'; ctx.lineWidth = 1.5; ctx.stroke();
    }
    ctx.restore();
  }
}

function drawFinishOrb() {
  if (!finishOrb || !finishOrb.active) return;
  const sx = finishOrb.x - camera.x, sy = finishOrb.y - camera.y;
  if (sx + finishOrb.radius + 6 < 0 || sx - finishOrb.radius - 6 > CONFIG.VIEW_W) return;
  const ready = canFinish();
  const pulse = 1 + 0.15 * Math.sin(Date.now() * 0.005);
  ctx.save();
  if (!ready) ctx.globalAlpha = 0.35;
  ctx.beginPath(); ctx.arc(sx, sy, (finishOrb.radius + 6) * pulse, 0, Math.PI * 2);
  ctx.fillStyle = ready ? 'rgba(50,200,80,0.15)' : 'rgba(100,100,100,0.1)'; ctx.fill();
  ctx.beginPath(); ctx.arc(sx, sy, finishOrb.radius * pulse, 0, Math.PI * 2);
  ctx.fillStyle = ready ? '#2a8844' : '#444'; ctx.fill();
  ctx.strokeStyle = ready ? '#44dd66' : '#666'; ctx.lineWidth = 2; ctx.stroke();
  ctx.restore();
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  HUD                                                        ║
// ╚══════════════════════════════════════════════════════════════╝

function drawHUD() {
  const hudX = 36, hudY = 24;
  const rowGap = 20;  // equidistant vertical spacing between the three status rows

  // ── Row 1: Hearts ──
  // Heart shape is drawn centered on (hx, hy). With s=12:
  //   left edge  = hx - s,   right edge = hx + s
  //   top edge   = hy - s*0.3, bottom edge = hy + s*1.5
  // Align left edge of first heart with hudX, top edge with hudY.
  const heartS = 12;
  const heartSpacing = 30;  // center-to-center distance between hearts
  for (let i = 0; i < levelMaxHP; i++) {
    const hx = hudX + heartS + i * heartSpacing;
    const hy = hudY + heartS * 0.3;
    ctx.fillStyle = i < player.hp ? CONFIG.HEART_FULL : CONFIG.HEART_EMPTY;
    ctx.beginPath();
    ctx.moveTo(hx, hy + heartS * 0.3);
    ctx.bezierCurveTo(hx, hy - heartS * 0.3, hx - heartS, hy - heartS * 0.3, hx - heartS, hy + heartS * 0.3);
    ctx.bezierCurveTo(hx - heartS, hy + heartS * 0.8, hx, hy + heartS * 1.2, hx, hy + heartS * 1.5);
    ctx.bezierCurveTo(hx, hy + heartS * 1.2, hx + heartS, hy + heartS * 0.8, hx + heartS, hy + heartS * 0.3);
    ctx.bezierCurveTo(hx + heartS, hy - heartS * 0.3, hx, hy - heartS * 0.3, hx, hy + heartS * 0.3);
    ctx.fill();
  }
  const heartVisualH = Math.ceil(heartS * 1.8);  // 22px

  // ── Row 2: Bullets (only if shooting unlocked) ──
  const bulletIconW = 22, bulletIconH = 9, bulletGap = 5;
  const bulletsY = hudY + heartVisualH + rowGap;
  if (shootingUnlocked()) {
    for (let i = 0; i < player.shots; i++) {
      const ix = hudX + i * (bulletIconW + bulletGap);
      if (bulletImg.complete && bulletImg.naturalWidth > 0) {
        ctx.drawImage(bulletImg, ix, bulletsY, bulletIconW, bulletIconH);
      } else {
        ctx.fillStyle = '#ddd';
        ctx.fillRect(ix, bulletsY, bulletIconW, bulletIconH);
      }
    }
  }

  // ── Row 3: Air charges ──
  const airIconW = 23, airIconH = 11, airGap = 4;
  const airY = bulletsY + bulletIconH + rowGap;
  for (let i = 0; i < player.airCharges; i++) {
    const ix = hudX + i * (airIconW + airGap);
    if (airCountImg.complete && airCountImg.naturalWidth > 0) {
      ctx.drawImage(airCountImg, ix, airY, airIconW, airIconH);
    } else {
      ctx.fillStyle = CONFIG.CHARGE_FULL;
      ctx.fillRect(ix, airY, airIconW, airIconH);
    }
  }

  // ── Cooldown bars (below the three status rows) ──
  const barBaseY = airY + airIconH + rowGap;
  if (player.hitCooldownTimer > 0) {
    const cdP = 1 - (player.hitCooldownTimer / CONFIG.HIT_COOLDOWN);
    ctx.fillStyle = '#333344'; ctx.fillRect(hudX, barBaseY, 60, 4);
    ctx.fillStyle = CONFIG.HIT_COLOR; ctx.fillRect(hudX, barBaseY, 60 * cdP, 4);
  }
  if (player.ghostTimer > 0) {
    const gP = player.ghostTimer / CONFIG.GHOST_DURATION;
    ctx.fillStyle = '#333344'; ctx.fillRect(hudX, barBaseY + 8, 80, 5);
    ctx.fillStyle = '#ccccff'; ctx.fillRect(hudX, barBaseY + 8, 80 * gP, 5);
    ctx.fillStyle = 'rgba(200,200,255,0.4)'; ctx.font = '12px Courier New'; ctx.fillText('GHOST', hudX + 85, barBaseY + 13);
  }
  if (timeScale < 1) {
    const sP = slowRealTimeTotal > 0 ? slowRealTimeLeft / slowRealTimeTotal : 0;
    ctx.fillStyle = '#333344'; ctx.fillRect(hudX, barBaseY + 18, 80, 5);
    ctx.fillStyle = '#8844bb'; ctx.fillRect(hudX, barBaseY + 18, 80 * sP, 5);
    ctx.fillStyle = 'rgba(140,70,200,0.5)'; ctx.font = '12px Courier New'; ctx.fillText('SLOW', hudX + 85, barBaseY + 23);
  }

  // Level indicator
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '12px Courier New'; ctx.textAlign = 'right';
  ctx.fillText('LEVEL ' + (currentLevel + 1), CONFIG.VIEW_W - 20, 22); ctx.textAlign = 'left';

  // Checkpoint counter
  if (checkpointObjects.length > 0) {
    const cleared = checkpointObjects.filter(cp => cp.cleared).length;
    const total = checkpointObjects.length;
    ctx.fillStyle = cleared === total ? 'rgba(68,221,102,0.5)' : 'rgba(255,255,255,0.25)';
    ctx.font = '12px Courier New'; ctx.textAlign = 'right';
    ctx.fillText('CP ' + cleared + '/' + total, CONFIG.VIEW_W - 20, 38); ctx.textAlign = 'left';
  }
}

function drawRestartButton() {
  const bx = CONFIG.RESTART_BTN_X, by = CONFIG.RESTART_BTN_Y, bw = CONFIG.RESTART_BTN_W, bh = CONFIG.RESTART_BTN_H;
  const hover = isOverRestartBtn() && (gameState === 'playing' || gameState === 'transition');
  ctx.fillStyle = hover ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.04)'; ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = hover ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1; ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = hover ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.25)';
  ctx.font = '11px Courier New'; ctx.textAlign = 'center'; ctx.fillText('RESTART', bx + bw / 2, by + bh / 2 + 4); ctx.textAlign = 'left';
}

function drawStartScreen() {
  ctx.fillStyle = 'rgba(10,10,15,0.7)'; ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
  ctx.fillStyle = '#fff'; ctx.font = '600 28px Courier New'; ctx.textAlign = 'center';
  ctx.fillText('LEVEL ' + (currentLevel + 1), CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 - 30);
  const pulse = 0.5 + 0.3 * Math.sin(Date.now() * 0.004);
  ctx.fillStyle = 'rgba(200,200,210,' + pulse + ')'; ctx.font = '16px Courier New';
  ctx.fillText('Click to start', CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 + 20);
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '14px Courier New';
  ctx.fillText('ARROWS - Move  ', CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 + 60);
  ctx.fillText(' SPACE - Jump  ', CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 + 80);
  ctx.fillText('     W - Dash  ', CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 + 100);
  ctx.fillText('     R - Hit   ', CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 + 120);
  if (shootingUnlocked()) ctx.fillText('     E - Shoot ', CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 + 140);
  ctx.textAlign = 'left';
}

function drawTransitionBanner() {
  const fadeStart = 30;
  const alpha = transitionTimer > fadeStart ? 1 : transitionTimer / fadeStart;
  ctx.fillStyle = 'rgba(10,10,15,' + 0.5 * alpha + ')'; ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
  ctx.globalAlpha = alpha; ctx.fillStyle = '#fff'; ctx.font = '600 32px Courier New'; ctx.textAlign = 'center';
  ctx.fillText('LEVEL ' + (currentLevel + 1), CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 - 10);
  ctx.globalAlpha = 1; ctx.textAlign = 'left';
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  RENDER COMPOSITING                                         ║
// ╚══════════════════════════════════════════════════════════════╝

function render() {
  updateCamera();
  drawBackground();
  drawFloorHoles();
  drawPlatforms();
  drawSpikes();
  drawTriangleBlocks();
  drawOrbs();
  drawCheckpoints();
  drawFinishOrb();
  drawEnemies();
  drawProjectiles();
  drawDashTrails();
  drawHitBox();
  drawPlayer();
  drawHUD();
  drawRestartButton();
  if (gameState === 'start') drawStartScreen();
  else if (gameState === 'transition') drawTransitionBanner();
}


// ╔══════════════════════════════════════════════════════════════╗
// ║  GAME LOOP — timeScale slows the accumulator                ║
// ╚══════════════════════════════════════════════════════════════╝

let lastTime = 0;
let accumulator = 0;

function gameLoop(timestamp) {
  if (lastTime === 0) lastTime = timestamp;
  let delta = timestamp - lastTime;
  lastTime = timestamp;
  if (delta > 200) delta = CONFIG.FIXED_DT;

  // Slow timer ticks in real time
  if (slowRealTimeLeft > 0) {
    slowRealTimeLeft -= delta;
    if (slowRealTimeLeft <= 0) { slowRealTimeLeft = 0; timeScale = 1.0; }
  }

  accumulator += delta * timeScale;
  while (accumulator >= CONFIG.FIXED_DT) {
    update();
    accumulator -= CONFIG.FIXED_DT;
  }

  render();
  requestAnimationFrame(gameLoop);
}

loadLevel(0);
requestAnimationFrame(gameLoop);

</script>
