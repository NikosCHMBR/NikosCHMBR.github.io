<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platformer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #gameWrapper { position: relative; }
  canvas {
    display: block;
    border: 2px solid #1a1a2e;
    border-radius: 4px;
    cursor: pointer;
  }
  #controls {
    position: absolute;
    bottom: -36px;
    left: 0; right: 0;
    text-align: center;
    color: #555;
    font-size: 12px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="controls">ARROWS move &nbsp;·&nbsp; SPACE jump &nbsp;·&nbsp; W dash &nbsp;·&nbsp; R hit</div>
</div>

<script>
// ============================================================
//  CONFIGURATION
// ============================================================
const CONFIG = {
  VIEW_W: 1280,
  VIEW_H: 720,

  GRAVITY: 0.55,
  TERMINAL_VELOCITY: 12,
  FIXED_DT: 1000 / 60,

  PLAYER_W: 24,
  PLAYER_H: 32,

  MOVE_ACCEL: 1.6,
  MOVE_DECEL: 0.45,
  MAX_MOVE_SPEED: 5,

  JUMP_VELOCITY: -10.6,
  JUMP_CUT_MULTIPLIER: 0.4,
  COYOTE_TIME: 6,
  JUMP_BUFFER: 6,

  DASH_SPEED: 13,
  DASH_DURATION: 11,
  DASH_COOLDOWN: 18,

  HIT_RANGE: 36,
  HIT_THICKNESS: 26,
  HIT_ACTIVE_FRAMES: 6,
  HIT_COOLDOWN: 18,
  HIT_KNOCKBACK: 1.8,

  DOT_BOUNCE: -5.3,
  GHOST_DURATION: 120,
  ORB_RADIUS: 8,
  ORB_RESPAWN_TIME: 300,
  MAX_AIR_CHARGES: 1,
  MAX_HP: 5,
  INVINCIBILITY_FRAMES: 90,
  FALL_DAMAGE: 2,

  SPIKE_TRIANGLE_H: 16,
  GROUND_H: 40,

  // Restart button (screen-space)
  RESTART_BTN_X: 1280 - 90,
  RESTART_BTN_Y: 8,
  RESTART_BTN_W: 70,
  RESTART_BTN_H: 26,

  BG_COLOR: '#0f1019',
  PLAYER_COLOR: '#e8533f',
  PLAYER_OUTLINE: '#ff7b6b',
  PLATFORM_COLOR: '#1e2233',
  PLATFORM_TOP: '#2a3050',
  GROUND_COLOR: '#1a1f30',
  GROUND_TOP: '#252d45',
  GRID_COLOR: 'rgba(255,255,255,0.015)',
  HIT_COLOR: '#ffcc44',
  HIT_COLOR_FADE: 'rgba(255, 204, 68, 0.3)',
  CHARGE_FULL: '#44ddaa',
  CHARGE_EMPTY: '#333344',
  HEART_FULL: '#e8533f',
  HEART_EMPTY: '#2a2a3a',
  SPIKE_COLOR: '#999aaa',
  SPIKE_OUTLINE: '#777788',
};

const GROUND_Y = CONFIG.VIEW_H - CONFIG.GROUND_H;
const FLOOR_SPAWN_Y = GROUND_Y - CONFIG.PLAYER_H;
const LEFT_SPAWN_X = 30;

// ============================================================
//  SEEDED RANDOM (for deterministic floor holes in levels 11-20)
// ============================================================
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    return s / 0x7fffffff;
  };
}

// ============================================================
//  LEVEL DATA
//  Each level now also supports:
//    floorHoles  — array of {x, w} gaps in the ground
//    finishX     — x position for the green finish dot
//    finishY     — y position for the green finish dot
// ============================================================
function makeDefaultLevel(levelIndex) {
  const AW = 2400;
  const floorHoles = [];

  // Levels 11-20 (index 10-19) get random floor holes
  if (levelIndex >= 10) {
    const rng = seededRandom(levelIndex * 7919 + 31);
    const holeCount = 2 + Math.floor(rng() * 3); // 2-4 holes
    for (let h = 0; h < holeCount; h++) {
      const holeW = 60 + Math.floor(rng() * 80);  // 60-140 wide
      // Place holes in safe range (avoid walls and spike zone 730-870)
      let holeX;
      let attempts = 0;
      do {
        holeX = 100 + Math.floor(rng() * (AW - 300));
        attempts++;
      } while (attempts < 20 && (
        holeX < 50 ||                           // too close to left wall
        holeX + holeW > AW - 50 ||              // too close to right wall
        (holeX < 870 + 30 && holeX + holeW > 730 - 30)  // overlaps spike zone
      ));
      if (attempts < 20) {
        floorHoles.push({ x: holeX, w: holeW });
      }
    }
  }

  return {
    arenaW: AW,
    spawnX: LEFT_SPAWN_X,
    spawnY: FLOOR_SPAWN_Y,
    floorHoles: floorHoles,
    platforms: [
      // Ground — will be split around holes in loadLevel
      { x: 0, y: GROUND_Y, w: AW, h: CONFIG.GROUND_H, isGround: true },

      // Left room (0–800)
      { x: 80,  y: 600, w: 130, h: 16, ghostable: true },
      { x: 280, y: 590, w: 120, h: 16 },
      { x: 480, y: 610, w: 110, h: 16, ghostable: true },
      { x: 650, y: 595, w: 120, h: 16 },
      { x: 120, y: 500, w: 100, h: 16 },
      { x: 340, y: 490, w: 120, h: 16, ghostable: true },
      { x: 560, y: 510, w: 100, h: 16 },
      { x: 60,  y: 400, w: 80,  h: 16, ghostable: true },
      { x: 420, y: 410, w: 90,  h: 16 },
      { x: 680, y: 390, w: 90,  h: 16 },

      // Main room (800–1600)
      { x: 880,  y: 600, w: 140, h: 16 },
      { x: 1080, y: 590, w: 120, h: 16, ghostable: true },
      { x: 1280, y: 610, w: 100, h: 16 },
      { x: 1440, y: 595, w: 130, h: 16, ghostable: true },
      { x: 950,  y: 500, w: 110, h: 16, ghostable: true },
      { x: 1160, y: 490, w: 130, h: 16 },
      { x: 1380, y: 505, w: 100, h: 16, ghostable: true },
      { x: 860,  y: 400, w: 90,  h: 16 },
      { x: 1100, y: 410, w: 80,  h: 16, ghostable: true },
      { x: 1480, y: 395, w: 80,  h: 16 },

      // Ghostable wall
      { x: 1584, y: 0, w: 16, h: GROUND_Y, ghostable: true },

      // Right room (1600–2400)
      { x: 1680, y: 605, w: 140, h: 16, ghostable: true },
      { x: 1880, y: 590, w: 120, h: 16 },
      { x: 2060, y: 610, w: 100, h: 16, ghostable: true },
      { x: 2220, y: 595, w: 130, h: 16 },
      { x: 1720, y: 500, w: 110, h: 16 },
      { x: 1920, y: 490, w: 130, h: 16, ghostable: true },
      { x: 2140, y: 505, w: 100, h: 16 },
      { x: 1660, y: 400, w: 90,  h: 16, ghostable: true },
      { x: 1900, y: 410, w: 80,  h: 16 },
      { x: 2280, y: 395, w: 80,  h: 16 },

      // Outer walls
      { x: 0, y: 0, w: 16, h: GROUND_Y },
      { x: AW - 16, y: 0, w: 16, h: GROUND_Y },
    ],
    orbs: [
      { x: 1200, y: 370, type: 'black' },
      { x: 1400, y: 380, type: 'red' },
      { x: 1560, y: 380, type: 'white' },
      { x: 1624, y: 380, type: 'white' },
    ],
    spikeZones: [
      { x: 730, w: 140, h: 18 },
    ],
    // Green finish dot — near right end
    finishX: AW - 80,
    finishY: FLOOR_SPAWN_Y - 20,
  };
}

const LEVELS = [];
for (let i = 0; i < 20; i++) {
  LEVELS.push(makeDefaultLevel(i));
}

// ============================================================
//  SPLIT GROUND AROUND FLOOR HOLES
// ============================================================
function splitGroundAroundHoles(groundPlat, holes) {
  if (!holes || holes.length === 0) return [{ ...groundPlat }];
  const sorted = [...holes].sort((a, b) => a.x - b.x);
  const segments = [];
  let curX = groundPlat.x;
  for (const hole of sorted) {
    if (hole.x > curX) {
      segments.push({ x: curX, y: groundPlat.y, w: hole.x - curX, h: groundPlat.h, isGround: true });
    }
    curX = hole.x + hole.w;
  }
  const endX = groundPlat.x + groundPlat.w;
  if (curX < endX) {
    segments.push({ x: curX, y: groundPlat.y, w: endX - curX, h: groundPlat.h, isGround: true });
  }
  return segments;
}

// ============================================================
//  ACTIVE LEVEL STATE
// ============================================================
let currentLevel = 0;
let arenaW = 2400;
let platforms = [];
let spikeList = [];
let orbObjects = [];
let floorHoleList = [];  // for rendering the dark gaps
let finishOrb = null;    // the green finish dot

// ============================================================
//  GAME STATE
// ============================================================
let gameState = 'start';

// ============================================================
//  CANVAS
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = CONFIG.VIEW_W;
canvas.height = CONFIG.VIEW_H;

// Mouse tracking for restart button hover
let mouseX = 0;
let mouseY = 0;

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (CONFIG.VIEW_W / rect.width);
  mouseY = (e.clientY - rect.top) * (CONFIG.VIEW_H / rect.height);
});

function isOverRestartBtn() {
  return mouseX >= CONFIG.RESTART_BTN_X && mouseX <= CONFIG.RESTART_BTN_X + CONFIG.RESTART_BTN_W &&
         mouseY >= CONFIG.RESTART_BTN_Y && mouseY <= CONFIG.RESTART_BTN_Y + CONFIG.RESTART_BTN_H;
}

canvas.addEventListener('click', (e) => {
  // Check restart button first
  if (gameState === 'playing' && isOverRestartBtn()) {
    loadLevel(currentLevel);
    return;
  }
  // Start screen click
  if (gameState === 'start') {
    gameState = 'playing';
    canvas.style.cursor = 'default';
  }
  canvas.focus();
});

canvas.setAttribute('tabindex', '0');

// ============================================================
//  CAMERA — smooth follow
// ============================================================
const camera = { x: 0 };

function updateCamera() {
  const target = player.x + player.w / 2 - CONFIG.VIEW_W / 2;
  // Softer lerp for smooth death/teleport transitions
  camera.x += (target - camera.x) * 0.08;
  if (camera.x < 0) camera.x = 0;
  if (camera.x > arenaW - CONFIG.VIEW_W) camera.x = arenaW - CONFIG.VIEW_W;
}

// ============================================================
//  INPUT
// ============================================================
const keys = {};
let jumpPressedThisFrame = false;
let jumpReleasedThisFrame = false;
let dashPressedThisFrame = false;
let hitPressedThisFrame = false;

window.addEventListener('keydown', (e) => {
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space',' '].includes(e.key) || e.code === 'Space') {
    e.preventDefault();
  }
  if (!keys[e.code]) {
    if (e.code === 'Space') jumpPressedThisFrame = true;
    if (e.code === 'KeyW') dashPressedThisFrame = true;
    if (e.code === 'KeyR') hitPressedThisFrame = true;
  }
  keys[e.code] = true;
});

window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
  if (e.code === 'Space') jumpReleasedThisFrame = true;
});

// ============================================================
//  PLAYER
// ============================================================
const player = {
  x: 0, y: 0,
  w: CONFIG.PLAYER_W, h: CONFIG.PLAYER_H,
  vx: 0, vy: 0,
  grounded: false,
  coyoteTimer: 0, jumpBufferTimer: 0,
  jumping: false, facingRight: true,
  airCharges: CONFIG.MAX_AIR_CHARGES,
  dashTimer: 0, dashCooldownTimer: 0, dashDirX: 0,
  hitActiveTimer: 0, hitCooldownTimer: 0,
  hitDir: 'right', hitKnockbackDone: false, hitSpikeBounceDone: false,
  ghostTimer: 0, safeX: 0, safeY: 0,
  hp: CONFIG.MAX_HP, invTimer: 0,
  lastGroundedX: 0, lastGroundedY: 0,
  squashX: 1, squashY: 1, landTimer: 0,
  dashTrails: [],
};

let spawnX = 0;
let spawnY = 0;

// ============================================================
//  LEVEL LOADING
// ============================================================
function loadLevel(n) {
  if (n < 0 || n >= LEVELS.length) return;
  currentLevel = n;
  const lvl = LEVELS[n];

  arenaW = lvl.arenaW;
  spawnX = lvl.spawnX;
  spawnY = lvl.spawnY;

  // Build platforms — split ground around floor holes
  platforms = [];
  for (const p of lvl.platforms) {
    if (p.isGround) {
      const segments = splitGroundAroundHoles(p, lvl.floorHoles);
      platforms.push(...segments);
    } else {
      platforms.push({ ...p });
    }
  }

  // Store floor holes for rendering
  floorHoleList = (lvl.floorHoles || []).map(h => ({
    x: h.x, y: GROUND_Y, w: h.w, h: CONFIG.GROUND_H,
  }));

  spikeList = lvl.spikeZones.map(sz => ({
    x: sz.x, y: GROUND_Y - sz.h, w: sz.w, h: sz.h,
  }));

  orbObjects = lvl.orbs.map(o => ({
    x: o.x, y: o.y, type: o.type,
    radius: CONFIG.ORB_RADIUS, active: true, respawnTimer: 0,
  }));

  // Green finish dot
  finishOrb = {
    x: lvl.finishX, y: lvl.finishY,
    radius: CONFIG.ORB_RADIUS + 2, active: true,
  };

  respawn();
  // Don't snap camera — let smooth follow handle it from wherever it was
  // But for initial load or new level, set a reasonable starting position
  camera.x = Math.max(0, Math.min(spawnX - CONFIG.VIEW_W / 2, arenaW - CONFIG.VIEW_W));

  gameState = 'start';
  canvas.style.cursor = 'pointer';

  if (window.parent !== window) {
    window.parent.postMessage({ type: 'levelLoaded', level: n }, '*');
  }
}

// ============================================================
//  LISTEN FOR LEVEL COMMANDS FROM PARENT
// ============================================================
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'loadLevel' && typeof e.data.level === 'number') {
    loadLevel(e.data.level);
  }
});

// ============================================================
//  HELPERS
// ============================================================
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function orbToBox(o) {
  return { x: o.x - o.radius, y: o.y - o.radius, w: o.radius * 2, h: o.radius * 2 };
}

function isSolid(plat) {
  if (plat.isGround) return true;
  if (plat.ghostable && player.ghostTimer > 0) return false;
  return true;
}

function isInsideGhostable() {
  for (const plat of platforms) {
    if (plat.ghostable && rectsOverlap(player, plat)) return true;
  }
  return false;
}

function respawn() {
  player.x = spawnX; player.y = spawnY;
  player.vx = 0; player.vy = 0;
  player.hp = CONFIG.MAX_HP;
  player.invTimer = 0;
  player.airCharges = CONFIG.MAX_AIR_CHARGES;
  player.dashTimer = 0; player.dashCooldownTimer = 0;
  player.ghostTimer = 0;
  player.hitActiveTimer = 0; player.hitCooldownTimer = 0;
  player.grounded = false; player.jumping = false;
  player.lastGroundedX = spawnX; player.lastGroundedY = spawnY;
  player.safeX = spawnX; player.safeY = spawnY;
  player.squashX = 1; player.squashY = 1;
  player.dashTrails = [];
}

function takeDamage(amount) {
  if (player.invTimer > 0) return;
  player.hp -= amount;
  if (player.hp <= 0) { respawn(); return; }
  player.x = player.lastGroundedX;
  player.y = player.lastGroundedY;
  player.vx = 0; player.vy = 0;
  player.dashTimer = 0;
  player.invTimer = CONFIG.INVINCIBILITY_FRAMES;
}

function advanceLevel() {
  const next = (currentLevel + 1) % LEVELS.length;
  loadLevel(next); // loadLevel already notifies parent
}

// ============================================================
//  COLLISION
// ============================================================
function resolveCollisions() {
  player.grounded = false;

  player.x += player.vx;
  for (const plat of platforms) {
    if (!isSolid(plat)) continue;
    if (!rectsOverlap(player, plat)) continue;
    if (player.vx > 0) {
      player.x = plat.x - player.w; player.vx = 0;
      if (player.dashTimer > 0) player.dashTimer = 0;
    } else if (player.vx < 0) {
      player.x = plat.x + plat.w; player.vx = 0;
      if (player.dashTimer > 0) player.dashTimer = 0;
    }
  }

  player.y += player.vy;
  for (const plat of platforms) {
    if (!isSolid(plat)) continue;
    if (!rectsOverlap(player, plat)) continue;
    if (player.vy > 0) {
      player.y = plat.y - player.h;
      if (player.vy > 4) { player.squashX = 1.3; player.squashY = 0.7; player.landTimer = 8; }
      player.vy = 0; player.grounded = true; player.jumping = false;
    } else if (player.vy < 0) {
      player.y = plat.y + plat.h; player.vy = 0;
    }
  }
}

// ============================================================
//  HIT BOX
// ============================================================
function computeHitBox(dir) {
  const range = CONFIG.HIT_RANGE;
  const thick = CONFIG.HIT_THICKNESS;
  switch (dir) {
    case 'right': return { x: player.x + player.w, y: player.y + player.h/2 - thick/2, w: range, h: thick };
    case 'left':  return { x: player.x - range, y: player.y + player.h/2 - thick/2, w: range, h: thick };
    case 'up':    return { x: player.x + player.w/2 - thick/2, y: player.y - range, w: thick, h: range };
    case 'down':  return { x: player.x + player.w/2 - thick/2, y: player.y + player.h, w: thick, h: range };
  }
}

// ============================================================
//  UPDATE
// ============================================================
function update() {
  if (gameState !== 'playing') return;

  const moveLeft = keys['ArrowLeft'];
  const moveRight = keys['ArrowRight'];
  const holdUp = keys['ArrowUp'];
  const holdDown = keys['ArrowDown'];

  if (player.invTimer > 0) player.invTimer--;

  if (player.grounded) {
    player.airCharges = CONFIG.MAX_AIR_CHARGES;
    player.lastGroundedX = player.x;
    player.lastGroundedY = player.y;
  }

  if (player.dashTimer > 0) {
    player.vx = CONFIG.DASH_SPEED * player.dashDirX;
    player.vy = 0;
    if (player.dashTimer % 2 === 0) player.dashTrails.push({ x: player.x, y: player.y, alpha: 0.6 });
    player.dashTimer--;
  } else {
    if (moveLeft && !moveRight) {
      player.vx -= CONFIG.MOVE_ACCEL;
      if (player.vx < -CONFIG.MAX_MOVE_SPEED) player.vx = -CONFIG.MAX_MOVE_SPEED;
      player.facingRight = false;
    } else if (moveRight && !moveLeft) {
      player.vx += CONFIG.MOVE_ACCEL;
      if (player.vx > CONFIG.MAX_MOVE_SPEED) player.vx = CONFIG.MAX_MOVE_SPEED;
      player.facingRight = true;
    } else {
      player.vx *= CONFIG.MOVE_DECEL;
      if (Math.abs(player.vx) < 0.1) player.vx = 0;
    }
    player.vy += CONFIG.GRAVITY;
    if (player.vy > CONFIG.TERMINAL_VELOCITY) player.vy = CONFIG.TERMINAL_VELOCITY;
  }

  if (player.dashCooldownTimer > 0) player.dashCooldownTimer--;

  if (dashPressedThisFrame && player.dashTimer <= 0 && player.dashCooldownTimer <= 0) {
    const isGrounded = player.grounded || player.coyoteTimer > 0;
    const canDash = isGrounded || player.airCharges > 0;
    if (canDash) {
      player.dashTimer = CONFIG.DASH_DURATION;
      player.dashCooldownTimer = CONFIG.DASH_COOLDOWN;
      player.dashDirX = player.facingRight ? 1 : -1;
      player.vy = 0; player.jumping = false;
      if (!isGrounded) player.airCharges--;
      else { player.coyoteTimer = 0; player.grounded = false; }
      player.squashX = 1.4; player.squashY = 0.7;
    }
  }

  if (player.grounded) player.coyoteTimer = CONFIG.COYOTE_TIME;
  else if (player.coyoteTimer > 0) player.coyoteTimer--;

  if (jumpPressedThisFrame) player.jumpBufferTimer = CONFIG.JUMP_BUFFER;
  if (player.jumpBufferTimer > 0) player.jumpBufferTimer--;

  if (player.dashTimer <= 0) {
    const canGroundJump = player.coyoteTimer > 0;
    const canAirJump = !canGroundJump && player.airCharges > 0;
    if ((canGroundJump || canAirJump) && player.jumpBufferTimer > 0) {
      player.vy = CONFIG.JUMP_VELOCITY;
      player.grounded = false; player.coyoteTimer = 0; player.jumpBufferTimer = 0;
      player.jumping = true;
      if (canAirJump) player.airCharges--;
      player.squashX = 0.75; player.squashY = 1.3;
    }
  }

  if (jumpReleasedThisFrame && player.jumping && player.vy < 0) {
    player.vy *= CONFIG.JUMP_CUT_MULTIPLIER;
    player.jumping = false;
  }

  if (player.hitCooldownTimer > 0) player.hitCooldownTimer--;

  if (hitPressedThisFrame && player.hitCooldownTimer <= 0) {
    if (holdUp) player.hitDir = 'up';
    else if (holdDown) player.hitDir = 'down';
    else player.hitDir = player.facingRight ? 'right' : 'left';
    player.hitActiveTimer = CONFIG.HIT_ACTIVE_FRAMES;
    player.hitCooldownTimer = CONFIG.HIT_COOLDOWN;
    player.hitKnockbackDone = false;
    player.hitSpikeBounceDone = false;
  }

  if (player.hitActiveTimer > 0) {
    const hitBox = computeHitBox(player.hitDir);

    if (!player.hitKnockbackDone) {
      for (const plat of platforms) {
        if (rectsOverlap(hitBox, plat)) {
          const kb = CONFIG.HIT_KNOCKBACK;
          switch (player.hitDir) {
            case 'right': player.vx -= kb; break;
            case 'left':  player.vx += kb; break;
            case 'up':    player.vy += kb; break;
            case 'down':  player.vy -= kb; break;
          }
          player.hitKnockbackDone = true;
          break;
        }
      }
    }

    for (const orb of orbObjects) {
      if (!orb.active) continue;
      if (!rectsOverlap(hitBox, orbToBox(orb))) continue;
      orb.active = false;
      orb.respawnTimer = CONFIG.ORB_RESPAWN_TIME;
      player.airCharges = CONFIG.MAX_AIR_CHARGES;
      if ((orb.type === 'red' || orb.type === 'white') && player.hitDir === 'down') {
        player.vy = CONFIG.DOT_BOUNCE;
        player.jumping = false;
        player.squashX = 1.2; player.squashY = 0.8;
      }
      if (orb.type === 'white') player.ghostTimer = CONFIG.GHOST_DURATION;
    }

    // Green finish orb — hit detection
    if (finishOrb && finishOrb.active && rectsOverlap(hitBox, orbToBox(finishOrb))) {
      advanceLevel();
      return; // stop processing this frame
    }

    if (!player.hitSpikeBounceDone && player.hitDir === 'down') {
      for (const sp of spikeList) {
        if (rectsOverlap(hitBox, sp)) {
          player.vy = CONFIG.DOT_BOUNCE;
          player.jumping = false;
          player.airCharges = CONFIG.MAX_AIR_CHARGES;
          player.squashX = 1.2; player.squashY = 0.8;
          player.hitSpikeBounceDone = true;
          break;
        }
      }
    }

    player.hitActiveTimer--;
  }

  for (const orb of orbObjects) {
    if (!orb.active) { orb.respawnTimer--; if (orb.respawnTimer <= 0) orb.active = true; }
  }

  resolveCollisions();

  // Green finish orb — body touch detection
  if (finishOrb && finishOrb.active && rectsOverlap(player, orbToBox(finishOrb))) {
    advanceLevel();
    return;
  }

  // Spike body damage
  for (const sp of spikeList) {
    if (player.invTimer <= 0 && rectsOverlap(player, sp)) { takeDamage(1); break; }
  }

  // Floor hole fall detection — player fell below ground level
  if (player.y > CONFIG.VIEW_H + 60) {
    takeDamage(CONFIG.FALL_DAMAGE);
  }

  // Ghosting
  if (player.ghostTimer > 0) {
    if (!isInsideGhostable()) { player.safeX = player.x; player.safeY = player.y; }
    player.ghostTimer--;
    if (player.ghostTimer <= 0 && isInsideGhostable()) {
      player.x = player.safeX; player.y = player.safeY;
      player.vx = 0; player.vy = 0; player.dashTimer = 0;
    }
  } else {
    player.safeX = player.x; player.safeY = player.y;
  }

  // Visual decay
  player.squashX += (1 - player.squashX) * 0.25;
  player.squashY += (1 - player.squashY) * 0.25;
  if (player.landTimer > 0) player.landTimer--;

  for (let i = player.dashTrails.length - 1; i >= 0; i--) {
    player.dashTrails[i].alpha -= 0.08;
    if (player.dashTrails[i].alpha <= 0) player.dashTrails.splice(i, 1);
  }

  jumpPressedThisFrame = false;
  jumpReleasedThisFrame = false;
  dashPressedThisFrame = false;
  hitPressedThisFrame = false;
}

// ============================================================
//  RENDER
// ============================================================
function drawBackground() {
  ctx.fillStyle = CONFIG.BG_COLOR;
  ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
  ctx.strokeStyle = CONFIG.GRID_COLOR;
  ctx.lineWidth = 1;
  const gridSize = 40;
  const startX = Math.floor(camera.x / gridSize) * gridSize;
  for (let gx = startX; gx < camera.x + CONFIG.VIEW_W; gx += gridSize) {
    const sx = gx - camera.x;
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, CONFIG.VIEW_H); ctx.stroke();
  }
  for (let gy = 0; gy < CONFIG.VIEW_H; gy += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(CONFIG.VIEW_W, gy); ctx.stroke();
  }
}

function drawPlatforms() {
  const ghosting = player.ghostTimer > 0;
  const shimmerPhase = Date.now() * 0.004;
  for (const plat of platforms) {
    const sx = plat.x - camera.x;
    if (sx + plat.w < 0 || sx > CONFIG.VIEW_W) continue;
    ctx.fillStyle = plat.isGround ? CONFIG.GROUND_COLOR : CONFIG.PLATFORM_COLOR;
    ctx.fillRect(sx, plat.y, plat.w, plat.h);
    ctx.fillStyle = plat.isGround ? CONFIG.GROUND_TOP : CONFIG.PLATFORM_TOP;
    ctx.fillRect(sx, plat.y, plat.w, plat.isGround ? 3 : 2);
    if (ghosting && plat.ghostable) {
      const shimmerAlpha = 0.08 + 0.06 * Math.sin(shimmerPhase + plat.x * 0.01);
      ctx.fillStyle = `rgba(220, 220, 255, ${shimmerAlpha})`;
      ctx.fillRect(sx, plat.y, plat.w, plat.h);
      ctx.strokeStyle = `rgba(220, 220, 255, ${0.15 + 0.1 * Math.sin(shimmerPhase * 1.5)})`;
      ctx.lineWidth = 1;
      ctx.strokeRect(sx + 0.5, plat.y + 0.5, plat.w - 1, plat.h - 1);
    }
  }
}

function drawFloorHoles() {
  // Draw dark void where floor holes are
  for (const hole of floorHoleList) {
    const sx = hole.x - camera.x;
    if (sx + hole.w < 0 || sx > CONFIG.VIEW_W) continue;
    ctx.fillStyle = '#050508';
    ctx.fillRect(sx, hole.y, hole.w, hole.h);
    // Danger edges
    ctx.strokeStyle = 'rgba(200, 50, 50, 0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(sx, hole.y); ctx.lineTo(sx, hole.y + hole.h);
    ctx.moveTo(sx + hole.w, hole.y); ctx.lineTo(sx + hole.w, hole.y + hole.h);
    ctx.stroke();
  }
}

function drawSpikes() {
  const triH = CONFIG.SPIKE_TRIANGLE_H;
  const triW = 14;
  for (const sp of spikeList) {
    const sx = sp.x - camera.x;
    if (sx + sp.w < 0 || sx > CONFIG.VIEW_W) continue;
    const baseY = sp.y + sp.h;
    const count = Math.floor(sp.w / triW);
    const startX = sx + (sp.w - count * triW) / 2;
    ctx.fillStyle = CONFIG.SPIKE_COLOR;
    ctx.strokeStyle = CONFIG.SPIKE_OUTLINE;
    ctx.lineWidth = 1;
    for (let i = 0; i < count; i++) {
      const tx = startX + i * triW;
      ctx.beginPath();
      ctx.moveTo(tx, baseY);
      ctx.lineTo(tx + triW / 2, baseY - triH);
      ctx.lineTo(tx + triW, baseY);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }
  }
}

function drawDashTrails() {
  for (const trail of player.dashTrails) {
    ctx.fillStyle = `rgba(232, 83, 63, ${trail.alpha * 0.4})`;
    ctx.fillRect(trail.x - camera.x, trail.y, player.w, player.h);
  }
}

function drawHitBox() {
  if (player.hitActiveTimer <= 0) return;
  const hb = computeHitBox(player.hitDir);
  const progress = player.hitActiveTimer / CONFIG.HIT_ACTIVE_FRAMES;
  const sx = hb.x - camera.x;
  ctx.globalAlpha = progress;
  ctx.fillStyle = CONFIG.HIT_COLOR;
  ctx.fillRect(sx, hb.y, hb.w, hb.h);
  ctx.fillStyle = CONFIG.HIT_COLOR_FADE;
  const expand = 4 * progress;
  ctx.fillRect(sx - expand, hb.y - expand, hb.w + expand * 2, hb.h + expand * 2);
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  const cx = player.x + player.w / 2 - camera.x;
  const cy = player.y + player.h / 2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(player.squashX, player.squashY);

  if (player.invTimer > 0 && Math.floor(player.invTimer / 4) % 2 === 0) ctx.globalAlpha = 0.3;
  if (player.ghostTimer > 0) {
    const flickerRate = player.ghostTimer < 30 ? 4 : 0;
    if (flickerRate > 0 && Math.floor(player.ghostTimer / flickerRate) % 2 === 0) ctx.globalAlpha = 0.35;
    else ctx.globalAlpha = Math.min(ctx.globalAlpha || 1, 0.6);
  }

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(-player.w/2 + 2, -player.h/2 + 2, player.w, player.h);
  ctx.fillStyle = CONFIG.PLAYER_COLOR;
  ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
  ctx.strokeStyle = CONFIG.PLAYER_OUTLINE;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(-player.w/2, -player.h/2, player.w, player.h);

  if (player.ghostTimer > 0) {
    ctx.fillStyle = 'rgba(200, 200, 255, 0.15)';
    ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
  }

  const eyeY = -player.h/2 + 10;
  const eyeSpacing = 5;
  const eyeOffsetX = player.facingRight ? 2 : -2;
  ctx.fillStyle = '#fff';
  ctx.fillRect(-eyeSpacing + eyeOffsetX - 2, eyeY - 2, 4, 5);
  ctx.fillRect(eyeSpacing + eyeOffsetX - 2, eyeY - 2, 4, 5);
  const pupilShift = player.facingRight ? 1 : -1;
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(-eyeSpacing + eyeOffsetX - 1 + pupilShift, eyeY - 1, 2, 3);
  ctx.fillRect(eyeSpacing + eyeOffsetX - 1 + pupilShift, eyeY - 1, 2, 3);

  ctx.globalAlpha = 1;
  ctx.restore();
}

const ORB_COLORS = {
  black: { fill: '#111118', stroke: '#333344', glow: 'rgba(0, 0, 0, 0.3)' },
  red:   { fill: '#661522', stroke: '#993344', glow: 'rgba(150, 30, 30, 0.25)' },
  white: { fill: '#ccccdd', stroke: '#ffffff', glow: 'rgba(200, 200, 220, 0.25)' },
};

function drawOrbs() {
  for (const orb of orbObjects) {
    if (!orb.active) continue;
    const sx = orb.x - camera.x;
    if (sx + orb.radius + 4 < 0 || sx - orb.radius - 4 > CONFIG.VIEW_W) continue;
    const colors = ORB_COLORS[orb.type] || ORB_COLORS.black;
    ctx.save();
    ctx.beginPath(); ctx.arc(sx, orb.y, orb.radius + 4, 0, Math.PI * 2);
    ctx.fillStyle = colors.glow; ctx.fill();
    ctx.beginPath(); ctx.arc(sx, orb.y, orb.radius, 0, Math.PI * 2);
    ctx.fillStyle = colors.fill; ctx.fill();
    ctx.strokeStyle = colors.stroke; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.restore();
  }
}

function drawFinishOrb() {
  if (!finishOrb || !finishOrb.active) return;
  const sx = finishOrb.x - camera.x;
  if (sx + finishOrb.radius + 6 < 0 || sx - finishOrb.radius - 6 > CONFIG.VIEW_W) return;

  // Pulsing glow
  const pulse = 1 + 0.15 * Math.sin(Date.now() * 0.005);

  ctx.save();
  ctx.beginPath();
  ctx.arc(sx, finishOrb.y, (finishOrb.radius + 6) * pulse, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(50, 200, 80, 0.15)';
  ctx.fill();

  ctx.beginPath();
  ctx.arc(sx, finishOrb.y, finishOrb.radius * pulse, 0, Math.PI * 2);
  ctx.fillStyle = '#2a8844';
  ctx.fill();
  ctx.strokeStyle = '#44dd66';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
}

// ============================================================
//  HUD — 2x sized hearts and air indicator
// ============================================================
function drawHUD() {
  const hudX = 20;
  const hudY = 24;

  // Hearts — 2x size (s=12, spacing=38)
  for (let i = 0; i < CONFIG.MAX_HP; i++) {
    const hx = hudX + i * 38;
    const hy = hudY;
    ctx.fillStyle = i < player.hp ? CONFIG.HEART_FULL : CONFIG.HEART_EMPTY;
    ctx.beginPath();
    const s = 12;
    ctx.moveTo(hx, hy + s * 0.3);
    ctx.bezierCurveTo(hx, hy - s * 0.3, hx - s, hy - s * 0.3, hx - s, hy + s * 0.3);
    ctx.bezierCurveTo(hx - s, hy + s * 0.8, hx, hy + s * 1.2, hx, hy + s * 1.5);
    ctx.bezierCurveTo(hx, hy + s * 1.2, hx + s, hy + s * 0.8, hx + s, hy + s * 0.3);
    ctx.bezierCurveTo(hx + s, hy - s * 0.3, hx, hy - s * 0.3, hx, hy + s * 0.3);
    ctx.fill();
  }

  // AIR indicator — 2x size
  const airY = hudY + 36;
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '16px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('AIR', hudX - 4, airY + 6);
  for (let i = 0; i < CONFIG.MAX_AIR_CHARGES; i++) {
    const filled = i < player.airCharges;
    ctx.fillStyle = filled ? CONFIG.CHARGE_FULL : CONFIG.CHARGE_EMPTY;
    ctx.fillRect(hudX + 44 + i * 28, airY - 8, 20, 20);
    ctx.strokeStyle = filled ? '#66eebb' : '#444455';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(hudX + 44 + i * 28, airY - 8, 20, 20);
  }

  // Hit cooldown bar (under air)
  if (player.hitCooldownTimer > 0) {
    const cdProgress = 1 - (player.hitCooldownTimer / CONFIG.HIT_COOLDOWN);
    ctx.fillStyle = '#333344'; ctx.fillRect(hudX, airY + 18, 60, 4);
    ctx.fillStyle = CONFIG.HIT_COLOR; ctx.fillRect(hudX, airY + 18, 60 * cdProgress, 4);
  }

  // Ghost bar
  if (player.ghostTimer > 0) {
    const ghostProgress = player.ghostTimer / CONFIG.GHOST_DURATION;
    ctx.fillStyle = '#333344'; ctx.fillRect(hudX, airY + 26, 80, 5);
    ctx.fillStyle = '#ccccff'; ctx.fillRect(hudX, airY + 26, 80 * ghostProgress, 5);
    ctx.fillStyle = 'rgba(200, 200, 255, 0.4)';
    ctx.font = '12px Courier New';
    ctx.fillText('GHOST', hudX + 85, airY + 31);
  }

  // Level indicator
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '12px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText('LEVEL ' + (currentLevel + 1), CONFIG.RESTART_BTN_X - 16, 24);
  ctx.textAlign = 'left';
}

// ============================================================
//  RESTART BUTTON (screen-space, top-right)
// ============================================================
function drawRestartButton() {
  const bx = CONFIG.RESTART_BTN_X;
  const by = CONFIG.RESTART_BTN_Y;
  const bw = CONFIG.RESTART_BTN_W;
  const bh = CONFIG.RESTART_BTN_H;
  const hover = isOverRestartBtn() && gameState === 'playing';

  ctx.fillStyle = hover ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.04)';
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = hover ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);

  ctx.fillStyle = hover ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.25)';
  ctx.font = '11px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('RESTART', bx + bw / 2, by + bh / 2 + 4);
  ctx.textAlign = 'left';
}

// ============================================================
//  START SCREEN
// ============================================================
function drawStartScreen() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.7)';
  ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);

  ctx.fillStyle = '#fff';
  ctx.font = '600 28px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('LEVEL ' + (currentLevel + 1), CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 - 30);

  const pulse = 0.5 + 0.3 * Math.sin(Date.now() * 0.004);
  ctx.fillStyle = `rgba(200, 200, 210, ${pulse})`;
  ctx.font = '16px Courier New';
  ctx.fillText('Click to start', CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 + 20);

  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '12px Courier New';
  ctx.fillText('ARROWS move  ·  SPACE jump  ·  W dash  ·  R hit', CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 + 60);

  ctx.textAlign = 'left';
}

// ============================================================
//  MAIN RENDER
// ============================================================
function render() {
  updateCamera();
  drawBackground();
  drawFloorHoles();
  drawPlatforms();
  drawSpikes();
  drawOrbs();
  drawFinishOrb();
  drawDashTrails();
  drawHitBox();
  drawPlayer();
  drawHUD();
  drawRestartButton();

  if (gameState === 'start') {
    drawStartScreen();
  }
}

// ============================================================
//  GAME LOOP
// ============================================================
let lastTime = 0;
let accumulator = 0;

function gameLoop(timestamp) {
  if (lastTime === 0) lastTime = timestamp;
  let delta = timestamp - lastTime;
  lastTime = timestamp;
  if (delta > 200) delta = CONFIG.FIXED_DT;
  accumulator += delta;
  while (accumulator >= CONFIG.FIXED_DT) {
    update();
    accumulator -= CONFIG.FIXED_DT;
  }
  render();
  requestAnimationFrame(gameLoop);
}

// ============================================================
//  INIT
// ============================================================
loadLevel(0);
requestAnimationFrame(gameLoop);
</script>
