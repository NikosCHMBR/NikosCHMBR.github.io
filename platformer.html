    { x: arenaW - 16, y: 0, w: 16, h: GROUND_Y },
  ];

// ============================================================
//  SPLIT GROUND AROUND FLOOR HOLES
// ============================================================
function splitGroundAroundHoles(groundPlat, holes) {
  if (!holes || holes.length === 0) return [{ ...groundPlat }];
  const sorted = [...holes].sort((a, b) => a.x - b.x);
  const segments = [];
  let curX = groundPlat.x;
  for (const hole of sorted) {
    if (hole.x > curX) segments.push({ x: curX, y: groundPlat.y, w: hole.x - curX, h: groundPlat.h, isGround: true });
    curX = hole.x + hole.w;
  }
  const endX = groundPlat.x + groundPlat.w;
  if (curX < endX) segments.push({ x: curX, y: groundPlat.y, w: endX - curX, h: groundPlat.h, isGround: true });
  return segments;
}

// ============================================================
//  ORB EFFECT APPLICATION (shared by hit, shot-orb, etc.)
// ============================================================
function applyOrbEffect(orbType, givesBounce) {
  // Air charge effects
  if (orbType === 'black' || orbType === 'red' || orbType === 'white') {
    player.airCharges = 1;
  } else if (orbType === 'yellow') {
    player.airCharges++;
  }
  // grey and purple do NOT affect air

  // Bounce (for red, yellow, white, grey, purple — all bounceable when hit from above or shot)
  if (givesBounce && (orbType === 'red' || orbType === 'yellow' || orbType === 'white' || orbType === 'grey' || orbType === 'purple')) {
    player.vy = CONFIG.DOT_BOUNCE;
    player.jumping = false;
    player.squashX = 1.2; player.squashY = 0.8;
  }

  // Ghost
  if (orbType === 'white') player.ghostTimer = CONFIG.GHOST_DURATION;

  // Remove ghost
  if (orbType === 'grey') player.ghostTimer = 0;

  // Slow time
  if (orbType === 'purple') {
    slowRealTimeLeft = CONFIG.SLOW_DURATION_MS;
    timeScale = CONFIG.SLOW_SCALE;
  }
}

function loadLevel(n) {
  if (n < 0 || n >= LEVELS.length) return;
  currentLevel = n;
  const lvl = LEVELS[n];
  arenaW = lvl.arenaW;
  spawnX = lvl.spawnX;
  spawnY = lvl.spawnY;

  platforms = [];
  for (const p of lvl.platforms) {
    if (p.isGround) platforms.push(...splitGroundAroundHoles(p, lvl.floorHoles));
    else platforms.push({ ...p });
  }
  floorHoleList = (lvl.floorHoles || []).map(h => ({ x: h.x, y: GROUND_Y, w: h.w, h: CONFIG.GROUND_H }));
  spikeList = (lvl.spikeZones || []).map(sz => ({ x: sz.x, y: GROUND_Y - sz.h, w: sz.w, h: sz.h }));
  orbObjects = (lvl.orbs || []).map(o => ({ x: o.x, y: o.y, type: o.type, radius: CONFIG.ORB_RADIUS, active: true, respawnTimer: 0 }));
  finishOrb = { x: lvl.finishX, y: lvl.finishY, radius: CONFIG.ORB_RADIUS + 2, active: true };
  enemyInitData = (lvl.enemies || []).map(e => ({ x: e.x, y: e.y }));
  resetEnemies();
  projectileList = [];
  slowRealTimeLeft = 0;
  timeScale = 1.0;
  respawn();
  camera.x = Math.max(0, Math.min(spawnX - CONFIG.VIEW_W / 2, arenaW - CONFIG.VIEW_W));
  gameState = 'start';
  canvas.style.cursor = 'pointer';
  if (window.parent !== window) window.parent.postMessage({ type: 'levelLoaded', level: n }, '*');
}

window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'loadLevel' && typeof e.data.level === 'number') loadLevel(e.data.level);
});

// ============================================================
//  HELPERS
// ============================================================
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
function orbToBox(o) { return { x: o.x - o.radius, y: o.y - o.radius, w: o.radius * 2, h: o.radius * 2 }; }
function isSolid(plat) {
  if (plat.isGround) return true;
  if (plat.ghostable && player.ghostTimer > 0) return false;
  return true;
}
function isInsideGhostable() {
  for (const plat of platforms) { if (plat.ghostable && rectsOverlap(player, plat)) return true; }
  return false;
}

function respawn() {
  player.x = spawnX; player.y = spawnY;
  player.vx = 0; player.vy = 0;
  player.hp = CONFIG.MAX_HP; player.invTimer = 0;
  player.airCharges = 1;
  player.dashTimer = 0; player.dashCooldownTimer = 0;
  player.ghostTimer = 0;
  player.hitActiveTimer = 0; player.hitCooldownTimer = 0;
  player.grounded = false; player.jumping = false;
  player.lastGroundedX = spawnX; player.lastGroundedY = spawnY;
  player.safeX = spawnX; player.safeY = spawnY;
  player.squashX = 1; player.squashY = 1; player.dashTrails = [];
  player.shots = CONFIG.MAX_SHOTS; player.shotCooldownTimer = 0;
  player.shotHoverTimer = 0; player.shotKills = 0;
  player.bufferedJump = false; player.bufferedDash = false;
  resetEnemies();
  projectileList = [];
}

function takeDamage(amount) {
  if (player.invTimer > 0) return;
  player.hp -= amount;
  if (player.hp <= 0) { respawn(); return; }
  player.x = player.lastGroundedX; player.y = player.lastGroundedY;
  player.vx = 0; player.vy = 0; player.dashTimer = 0;
  player.invTimer = CONFIG.INVINCIBILITY_FRAMES;
}
function takeEnemyDamage(enemyCenterX) {
  if (player.invTimer > 0) return;
  player.hp -= 1;
  if (player.hp <= 0) { respawn(); return; }
  const pushDir = (player.x + player.w / 2) > enemyCenterX ? 1 : -1;
  player.vx = pushDir * CONFIG.ENEMY_KNOCKBACK;
  player.vy = CONFIG.ENEMY_KNOCKBACK_Y;
  player.invTimer = CONFIG.INVINCIBILITY_FRAMES;
}
function advanceLevel() {
  const next = (currentLevel + 1) % LEVELS.length;
  loadLevel(next);
  gameState = 'transition'; transitionTimer = TRANSITION_TOTAL; canvas.style.cursor = 'default';
}

// ============================================================
//  COLLISION
// ============================================================
function resolveCollisions() {
  player.grounded = false;
  player.x += player.vx;
  for (const plat of platforms) {
    if (!isSolid(plat)) continue;
    if (!rectsOverlap(player, plat)) continue;
    if (player.vx > 0) { player.x = plat.x - player.w; player.vx = 0; if (player.dashTimer > 0) player.dashTimer = 0; }
    else if (player.vx < 0) { player.x = plat.x + plat.w; player.vx = 0; if (player.dashTimer > 0) player.dashTimer = 0; }
  }
  player.y += player.vy;
  for (const plat of platforms) {
    if (!isSolid(plat)) continue;
    if (!rectsOverlap(player, plat)) continue;
    if (player.vy > 0) {
      player.y = plat.y - player.h;
      if (player.vy > 4) { player.squashX = 1.3; player.squashY = 0.7; player.landTimer = 8; }
      player.vy = 0; player.grounded = true; player.jumping = false;
    } else if (player.vy < 0) { player.y = plat.y + plat.h; player.vy = 0; }
  }
}

function computeHitBox(dir) {
  const range = CONFIG.HIT_RANGE, thick = CONFIG.HIT_THICKNESS;
  switch (dir) {
    case 'right': return { x: player.x + player.w, y: player.y + player.h/2 - thick/2, w: range, h: thick };
    case 'left':  return { x: player.x - range, y: player.y + player.h/2 - thick/2, w: range, h: thick };
    case 'up':    return { x: player.x + player.w/2 - thick/2, y: player.y - range, w: thick, h: range };
    case 'down':  return { x: player.x + player.w/2 - thick/2, y: player.y + player.h, w: thick, h: range };
  }
}

// ============================================================
//  PROJECTILE UPDATE
// ============================================================
function updateProjectiles() {
  for (let i = projectileList.length - 1; i >= 0; i--) {
    const p = projectileList[i];
    p.x += p.dx; p.y += p.dy;

    // Off-screen / out of arena → remove
    if (p.x < -50 || p.x > arenaW + 50 || p.y < -50 || p.y > CONFIG.VIEW_H + 50) {
      projectileList.splice(i, 1); continue;
    }

    // Collision with solid (non-ghostable) platforms — shots always pass through ghostable
    let hitWall = false;
    for (const plat of platforms) {
      if (plat.ghostable) continue; // shots always traverse ghostable
      if (p.x >= plat.x && p.x <= plat.x + plat.w && p.y >= plat.y && p.y <= plat.y + plat.h) {
        hitWall = true; break;
      }
    }
    if (hitWall) { projectileList.splice(i, 1); continue; }

    // Hit enemy
    let hitEnemy = false;
    for (const enemy of enemyList) {
      if (!enemy.active) continue;
      if (p.x >= enemy.x && p.x <= enemy.x + enemy.w && p.y >= enemy.y && p.y <= enemy.y + enemy.h) {
        enemy.hp -= CONFIG.SHOT_ENEMY_DAMAGE;
        if (enemy.hp <= 0) {
          enemy.active = false;
          player.shotKills++;
          if (player.shotKills >= CONFIG.KILLS_PER_REFUND) {
            player.shotKills -= CONFIG.KILLS_PER_REFUND;
            player.shots = Math.min(player.shots + 1, CONFIG.MAX_SHOTS);
          }
        }
        hitEnemy = true; break;
      }
    }
    if (hitEnemy) { projectileList.splice(i, 1); continue; }

    // Hit orb — give player the orb's effect
    let hitOrb = false;
    for (const orb of orbObjects) {
      if (!orb.active) continue;
      const ob = orbToBox(orb);
      if (p.x >= ob.x && p.x <= ob.x + ob.w && p.y >= ob.y && p.y <= ob.y + ob.h) {
        orb.active = false;
        orb.respawnTimer = CONFIG.ORB_RESPAWN_TIME;
        applyOrbEffect(orb.type, true); // always give bounce when shot hits orb
        hitOrb = true; break;
      }
    }
    if (hitOrb) { projectileList.splice(i, 1); continue; }

    // Hit finish orb
    if (finishOrb && finishOrb.active) {
      const fb = orbToBox(finishOrb);
      if (p.x >= fb.x && p.x <= fb.x + fb.w && p.y >= fb.y && p.y <= fb.y + fb.h) {
        projectileList.splice(i, 1);
        advanceLevel(); return;
      }
    }
  }
}

// ============================================================
//  ENEMY UPDATE
// ============================================================
function updateEnemies() {
  for (let i = 0; i < enemyList.length; i++) {
    const enemy = enemyList[i];
    if (!enemy.active) continue;
    const speed = CONFIG.ENEMY_SPEED;
    const nextX = enemy.x + speed * enemy.dir;
    const feetY = enemy.y + enemy.h;
    const leadX = enemy.dir > 0 ? nextX + enemy.w : nextX;
    const groundBelow = hasGroundAt(leadX, feetY);
    const nextBox = { x: nextX, y: enemy.y, w: enemy.w, h: enemy.h };
    let hitsSpike = false;
    for (const sp of spikeList) { if (rectsOverlap(nextBox, sp)) { hitsSpike = true; break; } }
    const tooCloseToSpawn = Math.abs(nextX + enemy.w / 2 - spawnX) < CONFIG.ENEMY_SPAWN_DIST;
    if (!groundBelow || hitsSpike || tooCloseToSpawn) enemy.dir *= -1;
    else enemy.x = nextX;
    if (player.invTimer <= 0 && rectsOverlap(player, enemy)) takeEnemyDamage(enemy.x + enemy.w / 2);
  }
}

// ============================================================
//  UPDATE
// ============================================================
function update() {
  if (gameState === 'transition') { transitionTimer--; if (transitionTimer <= 0) gameState = 'playing'; }
  if (gameState !== 'playing' && gameState !== 'transition') return;

  const moveLeft = keys['ArrowLeft'], moveRight = keys['ArrowRight'];
  const holdUp = keys['ArrowUp'], holdDown = keys['ArrowDown'];

  if (player.invTimer > 0) player.invTimer--;

  // Ground resets air to exactly 1
  if (player.grounded) {
    player.airCharges = 1;
    player.lastGroundedX = player.x;
    player.lastGroundedY = player.y;
  }

  // Shot hover: keep vertical position, lock movement
  if (player.shotHoverTimer > 0) {
    player.vy = 0; // suspend gravity during hover
    player.shotHoverTimer--;
    // Buffer air-spending inputs
    if (jumpPressedThisFrame) player.bufferedJump = true;
    if (dashPressedThisFrame) player.bufferedDash = true;
    // When hover ends, release buffers
    if (player.shotHoverTimer <= 0) {
      if (player.bufferedJump) { jumpPressedThisFrame = true; player.jumpBufferTimer = CONFIG.JUMP_BUFFER; }
      if (player.bufferedDash) dashPressedThisFrame = true;
      player.bufferedJump = false; player.bufferedDash = false;
    }
  }

  const movementLocked = player.shotHoverTimer > 0;

  // Dash active
  if (player.dashTimer > 0) {
    player.vx = CONFIG.DASH_SPEED * player.dashDirX;
    player.vy = 0;
    if (player.dashTimer % 2 === 0) player.dashTrails.push({ x: player.x, y: player.y, alpha: 0.6 });
    player.dashTimer--;
  } else if (!movementLocked) {
    if (moveLeft && !moveRight) {
      player.vx -= CONFIG.MOVE_ACCEL;
      if (player.vx < -CONFIG.MAX_MOVE_SPEED) player.vx = -CONFIG.MAX_MOVE_SPEED;
      player.facingRight = false;
    } else if (moveRight && !moveLeft) {
      player.vx += CONFIG.MOVE_ACCEL;
      if (player.vx > CONFIG.MAX_MOVE_SPEED) player.vx = CONFIG.MAX_MOVE_SPEED;
      player.facingRight = true;
    } else {
      player.vx *= CONFIG.MOVE_DECEL;
      if (Math.abs(player.vx) < 0.1) player.vx = 0;
    }
    if (player.shotHoverTimer <= 0) {
      player.vy += CONFIG.GRAVITY;
      if (player.vy > CONFIG.TERMINAL_VELOCITY) player.vy = CONFIG.TERMINAL_VELOCITY;
    }
  } else {
    // Movement locked but not dashing — apply friction only
    player.vx *= CONFIG.MOVE_DECEL;
    if (Math.abs(player.vx) < 0.1) player.vx = 0;
  }

  if (player.dashCooldownTimer > 0) player.dashCooldownTimer--;

  if (!movementLocked && dashPressedThisFrame && player.dashTimer <= 0 && player.dashCooldownTimer <= 0) {
    const isGrounded = player.grounded || player.coyoteTimer > 0;
    const canDash = isGrounded || player.airCharges > 0;
    if (canDash) {
      player.dashTimer = CONFIG.DASH_DURATION;
      player.dashCooldownTimer = CONFIG.DASH_COOLDOWN;
      player.dashDirX = player.facingRight ? 1 : -1;
      player.vy = 0; player.jumping = false;
      if (!isGrounded) player.airCharges--;
      else { player.coyoteTimer = 0; player.grounded = false; }
      player.squashX = 1.4; player.squashY = 0.7;
    }
  }

  if (player.grounded) player.coyoteTimer = CONFIG.COYOTE_TIME;
  else if (player.coyoteTimer > 0) player.coyoteTimer--;

  if (jumpPressedThisFrame && !movementLocked) player.jumpBufferTimer = CONFIG.JUMP_BUFFER;
  if (player.jumpBufferTimer > 0) player.jumpBufferTimer--;

  if (player.dashTimer <= 0 && !movementLocked) {
    const canGroundJump = player.coyoteTimer > 0;
    const canAirJump = !canGroundJump && player.airCharges > 0;
    if ((canGroundJump || canAirJump) && player.jumpBufferTimer > 0) {
      player.vy = CONFIG.JUMP_VELOCITY;
      player.grounded = false; player.coyoteTimer = 0; player.jumpBufferTimer = 0;
      player.jumping = true;
      if (canAirJump) player.airCharges--;
      player.squashX = 0.75; player.squashY = 1.3;
    }
  }

  if (jumpReleasedThisFrame && player.jumping && player.vy < 0) {
    player.vy *= CONFIG.JUMP_CUT_MULTIPLIER; player.jumping = false;
  }

  // Shooting
  if (player.shotCooldownTimer > 0) player.shotCooldownTimer--;

  if (shootPressedThisFrame && player.shotCooldownTimer <= 0 && player.shots > 0) {
    let shotDir;
    if (holdUp) shotDir = 'up';
    else if (holdDown) shotDir = 'down';
    else shotDir = player.facingRight ? 'right' : 'left';

    let dx = 0, dy = 0;
    const spd = CONFIG.SHOT_SPEED;
    if (shotDir === 'right') dx = spd;
    else if (shotDir === 'left') dx = -spd;
    else if (shotDir === 'up') dy = -spd;
    else if (shotDir === 'down') dy = spd;

    // Spawn projectile from player center
    projectileList.push({
      x: player.x + player.w / 2,
      y: player.y + player.h / 2,
      dx: dx, dy: dy,
    });

    player.shots--;
    player.shotCooldownTimer = CONFIG.SHOT_COOLDOWN;

    // Horizontal shot effects
    if (shotDir === 'left' || shotDir === 'right') {
      player.vy = 0; // reset vertical speed
      player.shotHoverTimer = CONFIG.SHOT_HOVER_FRAMES;
      // Knockback in opposite direction
      player.vx += (shotDir === 'right' ? -CONFIG.SHOT_KNOCKBACK : CONFIG.SHOT_KNOCKBACK);
      player.bufferedJump = false; player.bufferedDash = false;
    }
    // Vertical shots: no movement effect
  }

  // Hit
  if (player.hitCooldownTimer > 0) player.hitCooldownTimer--;

  if (hitPressedThisFrame && player.hitCooldownTimer <= 0) {
    if (holdUp) player.hitDir = 'up';
    else if (holdDown) player.hitDir = 'down';
    else player.hitDir = player.facingRight ? 'right' : 'left';
    player.hitActiveTimer = CONFIG.HIT_ACTIVE_FRAMES;
    player.hitCooldownTimer = CONFIG.HIT_COOLDOWN;
    player.hitKnockbackDone = false; player.hitSpikeBounceDone = false;
    player.hitEnemyIds = new Set();
  }

  if (player.hitActiveTimer > 0) {
    const hitBox = computeHitBox(player.hitDir);
    if (!player.hitKnockbackDone) {
      for (const plat of platforms) {
        if (rectsOverlap(hitBox, plat)) {
          const kb = CONFIG.HIT_KNOCKBACK;
          switch (player.hitDir) {
            case 'right': player.vx -= kb; break; case 'left': player.vx += kb; break;
            case 'up': player.vy += kb; break; case 'down': player.vy -= kb; break;
          }
          player.hitKnockbackDone = true; break;
        }
      }
    }
    // Orb hits
    for (const orb of orbObjects) {
      if (!orb.active || !rectsOverlap(hitBox, orbToBox(orb))) continue;
      orb.active = false; orb.respawnTimer = CONFIG.ORB_RESPAWN_TIME;
      applyOrbEffect(orb.type, player.hitDir === 'down');
    }
    // Enemy hits
    for (let i = 0; i < enemyList.length; i++) {
      const enemy = enemyList[i];
      if (!enemy.active || (player.hitEnemyIds && player.hitEnemyIds.has(i)) || !rectsOverlap(hitBox, enemy)) continue;
      enemy.hp--;
      if (enemy.hp <= 0) enemy.active = false;
      if (player.hitEnemyIds) player.hitEnemyIds.add(i);
      if (player.hitDir === 'down') {
        player.vy = CONFIG.DOT_BOUNCE; player.jumping = false;
        player.airCharges = 1; player.squashX = 1.2; player.squashY = 0.8;
      }
    }
    // Finish orb hit
    if (finishOrb && finishOrb.active && rectsOverlap(hitBox, orbToBox(finishOrb))) { advanceLevel(); return; }
    // Spike bounce
    if (!player.hitSpikeBounceDone && player.hitDir === 'down') {
      for (const sp of spikeList) {
        if (rectsOverlap(hitBox, sp)) {
          player.vy = CONFIG.DOT_BOUNCE; player.jumping = false; player.airCharges = 1;
          player.squashX = 1.2; player.squashY = 0.8; player.hitSpikeBounceDone = true; break;
        }
      }
    }
    player.hitActiveTimer--;
  }

  // Orb respawn
  for (const orb of orbObjects) { if (!orb.active) { orb.respawnTimer--; if (orb.respawnTimer <= 0) orb.active = true; } }

  resolveCollisions();
  updateEnemies();
  updateProjectiles();

  // Finish orb body touch
  if (finishOrb && finishOrb.active && rectsOverlap(player, orbToBox(finishOrb))) { advanceLevel(); return; }

  // Spike body
  for (const sp of spikeList) { if (player.invTimer <= 0 && rectsOverlap(player, sp)) { takeDamage(1); break; } }

  // Floor hole fall
  if (player.y > CONFIG.VIEW_H + 60) takeDamage(CONFIG.FALL_DAMAGE);

  // Ghosting
  if (player.ghostTimer > 0) {
    if (!isInsideGhostable()) { player.safeX = player.x; player.safeY = player.y; }
    player.ghostTimer--;
    if (player.ghostTimer <= 0 && isInsideGhostable()) {
      player.x = player.safeX; player.y = player.safeY; player.vx = 0; player.vy = 0; player.dashTimer = 0;
    }
  } else { player.safeX = player.x; player.safeY = player.y; }

  // Visual decay
  player.squashX += (1 - player.squashX) * 0.25;
  player.squashY += (1 - player.squashY) * 0.25;
  if (player.landTimer > 0) player.landTimer--;
  for (let i = player.dashTrails.length - 1; i >= 0; i--) {
    player.dashTrails[i].alpha -= 0.08;
    if (player.dashTrails[i].alpha <= 0) player.dashTrails.splice(i, 1);
  }

  jumpPressedThisFrame = false; jumpReleasedThisFrame = false;
  dashPressedThisFrame = false; hitPressedThisFrame = false;
  shootPressedThisFrame = false;
}

// ============================================================
//  RENDER FUNCTIONS
// ============================================================
function drawBackground() {
  ctx.fillStyle = CONFIG.BG_COLOR; ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
  // Slow-time tint
  if (timeScale < 1) { ctx.fillStyle = 'rgba(80, 40, 120, 0.06)'; ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H); }
  ctx.strokeStyle = CONFIG.GRID_COLOR; ctx.lineWidth = 1;
  const gridSize = 40;
  const startX = Math.floor(camera.x / gridSize) * gridSize;
  for (let gx = startX; gx < camera.x + CONFIG.VIEW_W; gx += gridSize) {
    const sx = gx - camera.x; ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, CONFIG.VIEW_H); ctx.stroke();
  }
  for (let gy = 0; gy < CONFIG.VIEW_H; gy += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(CONFIG.VIEW_W, gy); ctx.stroke();
  }
}
function drawPlatforms() {
  const ghosting = player.ghostTimer > 0;
  const shimmerPhase = Date.now() * 0.004;
  for (const plat of platforms) {
    const sx = plat.x - camera.x;
    if (sx + plat.w < 0 || sx > CONFIG.VIEW_W) continue;
    ctx.fillStyle = plat.isGround ? CONFIG.GROUND_COLOR : CONFIG.PLATFORM_COLOR;
    ctx.fillRect(sx, plat.y, plat.w, plat.h);
    ctx.fillStyle = plat.isGround ? CONFIG.GROUND_TOP : CONFIG.PLATFORM_TOP;
    ctx.fillRect(sx, plat.y, plat.w, plat.isGround ? 3 : 2);
    if (ghosting && plat.ghostable) {
      ctx.fillStyle = `rgba(220, 220, 255, ${0.08 + 0.06 * Math.sin(shimmerPhase + plat.x * 0.01)})`;
      ctx.fillRect(sx, plat.y, plat.w, plat.h);
      ctx.strokeStyle = `rgba(220, 220, 255, ${0.15 + 0.1 * Math.sin(shimmerPhase * 1.5)})`;
      ctx.lineWidth = 1; ctx.strokeRect(sx + 0.5, plat.y + 0.5, plat.w - 1, plat.h - 1);
    }
  }
}
function drawFloorHoles() {
  for (const hole of floorHoleList) {
    const sx = hole.x - camera.x;
    if (sx + hole.w < 0 || sx > CONFIG.VIEW_W) continue;
    ctx.fillStyle = '#050508'; ctx.fillRect(sx, hole.y, hole.w, hole.h);
    ctx.strokeStyle = 'rgba(200, 50, 50, 0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(sx, hole.y); ctx.lineTo(sx, hole.y + hole.h);
    ctx.moveTo(sx + hole.w, hole.y); ctx.lineTo(sx + hole.w, hole.y + hole.h); ctx.stroke();
  }
}
function drawSpikes() {
  const triH = CONFIG.SPIKE_TRIANGLE_H, triW = 14;
  for (const sp of spikeList) {
    const sx = sp.x - camera.x;
    if (sx + sp.w < 0 || sx > CONFIG.VIEW_W) continue;
    const baseY = sp.y + sp.h;
    const count = Math.floor(sp.w / triW);
    const startX = sx + (sp.w - count * triW) / 2;
    ctx.fillStyle = CONFIG.SPIKE_COLOR; ctx.strokeStyle = CONFIG.SPIKE_OUTLINE; ctx.lineWidth = 1;
    for (let i = 0; i < count; i++) {
      const tx = startX + i * triW;
      ctx.beginPath(); ctx.moveTo(tx, baseY); ctx.lineTo(tx + triW / 2, baseY - triH); ctx.lineTo(tx + triW, baseY);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }
  }
}
function drawDashTrails() {
  for (const trail of player.dashTrails) {
    ctx.fillStyle = `rgba(232, 83, 63, ${trail.alpha * 0.4})`;
    ctx.fillRect(trail.x - camera.x, trail.y, player.w, player.h);
  }
}
function drawHitBox() {
  if (player.hitActiveTimer <= 0) return;
  const hb = computeHitBox(player.hitDir);
  const progress = player.hitActiveTimer / CONFIG.HIT_ACTIVE_FRAMES;
  const sx = hb.x - camera.x;
  ctx.globalAlpha = progress; ctx.fillStyle = CONFIG.HIT_COLOR; ctx.fillRect(sx, hb.y, hb.w, hb.h);
  ctx.fillStyle = CONFIG.HIT_COLOR_FADE;
  const expand = 4 * progress; ctx.fillRect(sx - expand, hb.y - expand, hb.w + expand * 2, hb.h + expand * 2);
  ctx.globalAlpha = 1;
}
function drawProjectiles() {
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  for (const p of projectileList) {
    const sx = p.x - camera.x;
    const len = 10;
    ctx.beginPath();
    ctx.moveTo(sx - p.dx / CONFIG.SHOT_SPEED * len, p.y - p.dy / CONFIG.SHOT_SPEED * len);
    ctx.lineTo(sx, p.y);
    ctx.stroke();
  }
}
function drawPlayer() {
  const cx = player.x + player.w / 2 - camera.x;
  const cy = player.y + player.h / 2;
  ctx.save(); ctx.translate(cx, cy); ctx.scale(player.squashX, player.squashY);
  if (player.invTimer > 0 && Math.floor(player.invTimer / 4) % 2 === 0) ctx.globalAlpha = 0.3;
  if (player.ghostTimer > 0) {
    const fr = player.ghostTimer < 30 ? 4 : 0;
    if (fr > 0 && Math.floor(player.ghostTimer / fr) % 2 === 0) ctx.globalAlpha = 0.35;
    else ctx.globalAlpha = Math.min(ctx.globalAlpha || 1, 0.6);
  }
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(-player.w/2 + 2, -player.h/2 + 2, player.w, player.h);
  ctx.fillStyle = CONFIG.PLAYER_COLOR; ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
  ctx.strokeStyle = CONFIG.PLAYER_OUTLINE; ctx.lineWidth = 1.5;
  ctx.strokeRect(-player.w/2, -player.h/2, player.w, player.h);
  if (player.ghostTimer > 0) { ctx.fillStyle = 'rgba(200, 200, 255, 0.15)'; ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h); }
  const eyeY = -player.h/2 + 10, eyeSpacing = 5, eyeOffsetX = player.facingRight ? 2 : -2;
  ctx.fillStyle = '#fff';
  ctx.fillRect(-eyeSpacing + eyeOffsetX - 2, eyeY - 2, 4, 5);
  ctx.fillRect(eyeSpacing + eyeOffsetX - 2, eyeY - 2, 4, 5);
  const pupilShift = player.facingRight ? 1 : -1;
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(-eyeSpacing + eyeOffsetX - 1 + pupilShift, eyeY - 1, 2, 3);
  ctx.fillRect(eyeSpacing + eyeOffsetX - 1 + pupilShift, eyeY - 1, 2, 3);
  ctx.globalAlpha = 1; ctx.restore();
}
function drawEnemies() {
  for (const enemy of enemyList) {
    if (!enemy.active) continue;
    const sx = enemy.x - camera.x;
    if (sx + enemy.w < 0 || sx > CONFIG.VIEW_W) continue;
    ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(sx + 2, enemy.y + 2, enemy.w, enemy.h);
    ctx.fillStyle = CONFIG.ENEMY_COLOR; ctx.fillRect(sx, enemy.y, enemy.w, enemy.h);
    ctx.strokeStyle = CONFIG.ENEMY_OUTLINE; ctx.lineWidth = 1; ctx.strokeRect(sx, enemy.y, enemy.w, enemy.h);
    const ecx = sx + enemy.w / 2, ecy = enemy.y + 10;
    ctx.fillStyle = '#cc4444';
    ctx.fillRect(ecx - 5 + enemy.dir, ecy - 1, 3, 3);
    ctx.fillRect(ecx + 3 + enemy.dir, ecy - 1, 3, 3);
    // Health bar
    const barW = enemy.w + 8, barH = 3, barX = sx - 4, barY = enemy.y - 8;
    const hpRatio = enemy.hp / CONFIG.ENEMY_MAX_HP;
    ctx.fillStyle = '#111'; ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = enemy.hp === 3 ? '#44aa55' : enemy.hp === 2 ? '#ccaa33' : '#cc3333';
    ctx.fillRect(barX, barY, barW * hpRatio, barH);
  }
}

const ORB_COLORS = {
  black:  { fill: '#111118', stroke: '#333344', glow: 'rgba(0, 0, 0, 0.3)' },
  red:    { fill: '#661522', stroke: '#993344', glow: 'rgba(150, 30, 30, 0.25)' },
  white:  { fill: '#ccccdd', stroke: '#ffffff', glow: 'rgba(200, 200, 220, 0.25)' },
  yellow: { fill: '#aa8822', stroke: '#ddcc44', glow: 'rgba(200, 180, 50, 0.2)' },
  grey:   { fill: '#555566', stroke: '#888899', glow: 'rgba(100, 100, 110, 0.2)' },
  purple: { fill: '#552277', stroke: '#8844bb', glow: 'rgba(100, 40, 150, 0.25)' },
};
function drawOrbs() {
  for (const orb of orbObjects) {
    if (!orb.active) continue;
    const sx = orb.x - camera.x;
    if (sx + orb.radius + 4 < 0 || sx - orb.radius - 4 > CONFIG.VIEW_W) continue;
    const c = ORB_COLORS[orb.type] || ORB_COLORS.black;
    ctx.save();
    ctx.beginPath(); ctx.arc(sx, orb.y, orb.radius + 4, 0, Math.PI * 2); ctx.fillStyle = c.glow; ctx.fill();
    ctx.beginPath(); ctx.arc(sx, orb.y, orb.radius, 0, Math.PI * 2); ctx.fillStyle = c.fill; ctx.fill();
    ctx.strokeStyle = c.stroke; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.restore();
  }
}
function drawFinishOrb() {
  if (!finishOrb || !finishOrb.active) return;
  const sx = finishOrb.x - camera.x;
  if (sx + finishOrb.radius + 6 < 0 || sx - finishOrb.radius - 6 > CONFIG.VIEW_W) return;
  const pulse = 1 + 0.15 * Math.sin(Date.now() * 0.005);
  ctx.save();
  ctx.beginPath(); ctx.arc(sx, finishOrb.y, (finishOrb.radius + 6) * pulse, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(50, 200, 80, 0.15)'; ctx.fill();
  ctx.beginPath(); ctx.arc(sx, finishOrb.y, finishOrb.radius * pulse, 0, Math.PI * 2);
  ctx.fillStyle = '#2a8844'; ctx.fill(); ctx.strokeStyle = '#44dd66'; ctx.lineWidth = 2; ctx.stroke();
  ctx.restore();
}

// ============================================================
//  HUD
// ============================================================
function drawHUD() {
  const hudX = 36, hudY = 24;

  // Hearts
  for (let i = 0; i < CONFIG.MAX_HP; i++) {
    const hx = hudX + i * 38, hy = hudY;
    ctx.fillStyle = i < player.hp ? CONFIG.HEART_FULL : CONFIG.HEART_EMPTY;
    ctx.beginPath(); const s = 12;
    ctx.moveTo(hx, hy + s*0.3);
    ctx.bezierCurveTo(hx, hy - s*0.3, hx - s, hy - s*0.3, hx - s, hy + s*0.3);
    ctx.bezierCurveTo(hx - s, hy + s*0.8, hx, hy + s*1.2, hx, hy + s*1.5);
    ctx.bezierCurveTo(hx, hy + s*1.2, hx + s, hy + s*0.8, hx + s, hy + s*0.3);
    ctx.bezierCurveTo(hx + s, hy - s*0.3, hx, hy - s*0.3, hx, hy + s*0.3);
    ctx.fill();
  }

  // Shots counter (below hearts)
  const shotY = hudY + 28;
  ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '12px Courier New'; ctx.textAlign = 'left';
  ctx.fillText('SHOTS', hudX - 4, shotY + 4);
  for (let i = 0; i < CONFIG.MAX_SHOTS; i++) {
    const filled = i < player.shots;
    ctx.fillStyle = filled ? '#ddd' : '#333';
    ctx.fillRect(hudX + 52 + i * 18, shotY - 5, 12, 12);
    ctx.strokeStyle = filled ? '#fff' : '#444'; ctx.lineWidth = 1;
    ctx.strokeRect(hudX + 52 + i * 18, shotY - 5, 12, 12);
  }
  // Kill refund bar (2-piece bar under shots)
  const refundY = shotY + 12;
  const refundW = 30;
  ctx.fillStyle = '#222'; ctx.fillRect(hudX + 52, refundY, refundW, 3);
  const refundProgress = player.shotKills / CONFIG.KILLS_PER_REFUND;
  ctx.fillStyle = '#aaa'; ctx.fillRect(hudX + 52, refundY, refundW * refundProgress, 3);
  // Divider at halfway
  ctx.fillStyle = '#444'; ctx.fillRect(hudX + 52 + refundW / 2 - 0.5, refundY, 1, 3);

  // AIR (number + box)
  const airY = shotY + 24;
  ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '16px Courier New';
  ctx.fillText('AIR', hudX - 4, airY + 6);
  // Show as number for flexibility
  ctx.fillStyle = player.airCharges > 0 ? CONFIG.CHARGE_FULL : CONFIG.CHARGE_EMPTY;
  ctx.font = '18px Courier New';
  ctx.fillText('' + player.airCharges, hudX + 48, airY + 7);

  // Hit cooldown
  const barBaseY = airY + 16;
  if (player.hitCooldownTimer > 0) {
    const cdP = 1 - (player.hitCooldownTimer / CONFIG.HIT_COOLDOWN);
    ctx.fillStyle = '#333344'; ctx.fillRect(hudX, barBaseY, 60, 4);
    ctx.fillStyle = CONFIG.HIT_COLOR; ctx.fillRect(hudX, barBaseY, 60 * cdP, 4);
  }
  // Ghost bar
  if (player.ghostTimer > 0) {
    const gP = player.ghostTimer / CONFIG.GHOST_DURATION;
    ctx.fillStyle = '#333344'; ctx.fillRect(hudX, barBaseY + 8, 80, 5);
    ctx.fillStyle = '#ccccff'; ctx.fillRect(hudX, barBaseY + 8, 80 * gP, 5);
    ctx.fillStyle = 'rgba(200, 200, 255, 0.4)'; ctx.font = '12px Courier New';
    ctx.fillText('GHOST', hudX + 85, barBaseY + 13);
  }
  // Slow bar
  if (timeScale < 1) {
    const sP = slowRealTimeLeft / CONFIG.SLOW_DURATION_MS;
    ctx.fillStyle = '#333344'; ctx.fillRect(hudX, barBaseY + 18, 80, 5);
    ctx.fillStyle = '#8844bb'; ctx.fillRect(hudX, barBaseY + 18, 80 * sP, 5);
    ctx.fillStyle = 'rgba(140, 70, 200, 0.5)'; ctx.font = '12px Courier New';
    ctx.fillText('SLOW', hudX + 85, barBaseY + 23);
  }

  // Level indicator
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '12px Courier New'; ctx.textAlign = 'right';
  ctx.fillText('LEVEL ' + (currentLevel + 1), CONFIG.VIEW_W - 20, 22); ctx.textAlign = 'left';
}

function drawRestartButton() {
  const bx = CONFIG.RESTART_BTN_X, by = CONFIG.RESTART_BTN_Y, bw = CONFIG.RESTART_BTN_W, bh = CONFIG.RESTART_BTN_H;
  const hover = isOverRestartBtn() && (gameState === 'playing' || gameState === 'transition');
  ctx.fillStyle = hover ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.04)'; ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = hover ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1; ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = hover ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.25)';
  ctx.font = '11px Courier New'; ctx.textAlign = 'center'; ctx.fillText('RESTART', bx + bw / 2, by + bh / 2 + 4); ctx.textAlign = 'left';
}
function drawStartScreen() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.7)'; ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
  ctx.fillStyle = '#fff'; ctx.font = '600 28px Courier New'; ctx.textAlign = 'center';
  ctx.fillText('LEVEL ' + (currentLevel + 1), CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 - 30);
  const pulse = 0.5 + 0.3 * Math.sin(Date.now() * 0.004);
  ctx.fillStyle = `rgba(200, 200, 210, ${pulse})`; ctx.font = '16px Courier New';
  ctx.fillText('Click to start', CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 + 20);
  ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.font = '12px Courier New';
  ctx.fillText('ARROWS move · SPACE jump · W dash · R hit · E shoot', CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 + 60);
  ctx.textAlign = 'left';
}
function drawTransitionBanner() {
  const fadeStart = 30;
  const alpha = transitionTimer > fadeStart ? 1 : transitionTimer / fadeStart;
  ctx.fillStyle = `rgba(10, 10, 15, ${0.5 * alpha})`; ctx.fillRect(0, 0, CONFIG.VIEW_W, CONFIG.VIEW_H);
  ctx.globalAlpha = alpha; ctx.fillStyle = '#fff'; ctx.font = '600 32px Courier New'; ctx.textAlign = 'center';
  ctx.fillText('LEVEL ' + (currentLevel + 1), CONFIG.VIEW_W / 2, CONFIG.VIEW_H / 2 - 10);
  ctx.globalAlpha = 1; ctx.textAlign = 'left';
}

function render() {
  updateCamera();
  drawBackground(); drawFloorHoles(); drawPlatforms(); drawSpikes();
  drawOrbs(); drawFinishOrb(); drawEnemies(); drawProjectiles();
  drawDashTrails(); drawHitBox(); drawPlayer();
  drawHUD(); drawRestartButton();
  if (gameState === 'start') drawStartScreen();
  else if (gameState === 'transition') drawTransitionBanner();
}

// ============================================================
//  GAME LOOP — timeScale applied to accumulator for slow effect
// ============================================================
let lastTime = 0;
let accumulator = 0;

function gameLoop(timestamp) {
  if (lastTime === 0) lastTime = timestamp;
  let delta = timestamp - lastTime;
  lastTime = timestamp;
  if (delta > 200) delta = CONFIG.FIXED_DT;

  // Slow timer counts in real time (not scaled)
  if (slowRealTimeLeft > 0) {
    slowRealTimeLeft -= delta;
    if (slowRealTimeLeft <= 0) { slowRealTimeLeft = 0; timeScale = 1.0; }
  }

  // Accumulator scaled by timeScale — everything naturally halves when slow
  accumulator += delta * timeScale;
  while (accumulator >= CONFIG.FIXED_DT) {
    update();
    accumulator -= CONFIG.FIXED_DT;
  }

  render();
  requestAnimationFrame(gameLoop);
}

loadLevel(0);
requestAnimationFrame(gameLoop);
</script>
</body>
