<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikos Platformer</title>

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        .page-container {
            max-width: 1340px;
        }
        
        .game-area {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 12px;
            padding: 0;
            text-align: center;
            margin-top: 2rem;
            overflow: hidden;
        }

        /* =============================================
           LEVEL SELECT — 2 rows of 10 buttons
           ============================================= */
        .level-select {
            margin-top: 1.2rem;
            padding: 0 0.5rem;
        }

        .level-select-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--subtle);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.6rem;
        }

        .level-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .level-btn {
            width: 48px;
            height: 36px;
            background: var(--card-bg, #161622);
            border: 1.5px solid var(--card-border, #222233);
            border-radius: 6px;
            color: var(--subtle, #666);
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .level-btn:hover {
            border-color: var(--accent, #e8533f);
            color: var(--text, #eee);
            transform: translateY(-1px);
        }

        .level-btn.active {
            background: var(--accent, #e8533f);
            border-color: var(--accent, #e8533f);
            color: var(--bg, #0a0a0f);
        }

        .level-btn.active:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Nikos</div>
        <ul class="nav-links">
            <li><a href="index.html">Start</a></li>
            <li><a href="index.html#projekte">Projekte</a></li>
            <li><a href="index.html#ueber">Über mich</a></li>
            <li><a href="game.html" class="nav-game-link">Spiel</a></li>
        </ul>
    </nav>

    <div class="page-container">

        <a href="index.html" class="back-link">&larr; Zurück zur Startseite</a>

        <h1>🎮 Spielbereich</h1>
        <p>
            Ein kleiner Platformer zum leiden und verzweifeln c:
        </p>

        <div class="game-area">
            <iframe 
                id="game-iframe"
                src="platformer.html" 
                width="1280" 
                height="720" 
                style="border: none; border-radius: 12px; display: block; max-width: 100%; margin: 0 auto;"
            ></iframe>
        </div>

        <!-- Level Select Buttons -->
        <div class="level-select">
            <div class="level-select-label">Level auswählen</div>
            <div class="level-row" id="level-row-1"></div>
            <div class="level-row" id="level-row-2"></div>
        </div>

    </div>

    <footer>
        <span>&copy; 2026 - Nikos, Chamber Enthusiast</span>
        <a href="https://github.com/NikosCHMBR" target="_blank">GitHub</a>
    </footer>

    <script src="script.js"></script>

    <script>
        // =============================================
        //  LEVEL SELECT — build 20 buttons, 2 rows of 10
        // =============================================
        const iframe = document.getElementById('game-iframe');
        const row1 = document.getElementById('level-row-1');
        const row2 = document.getElementById('level-row-2');
        const levelButtons = [];
        let activeLevel = 0;

        for (let i = 0; i < 20; i++) {
            const btn = document.createElement('button');
            btn.className = 'level-btn';
            btn.textContent = i + 1;
            btn.setAttribute('aria-label', 'Level ' + (i + 1));

            btn.addEventListener('click', function () {
                setActiveLevel(i);
                // Send level command to platformer iframe
                iframe.contentWindow.postMessage({ type: 'loadLevel', level: i }, '*');
            });

            // First 10 in row 1, next 10 in row 2
            if (i < 10) {
                row1.appendChild(btn);
            } else {
                row2.appendChild(btn);
            }
            levelButtons.push(btn);
        }

        function setActiveLevel(n) {
            levelButtons[activeLevel].classList.remove('active');
            activeLevel = n;
            levelButtons[activeLevel].classList.add('active');
        }

        // Listen for confirmation from platformer
        window.addEventListener('message', function (e) {
            if (e.data && e.data.type === 'levelLoaded' && typeof e.data.level === 'number') {
                setActiveLevel(e.data.level);
            }
        });

        // Set level 1 as active on load
        setActiveLevel(0);
    </script>
</body>
</html>
