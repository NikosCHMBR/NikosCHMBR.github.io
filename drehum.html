<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ausnahme</title>
    <style>
        img {
            max-width: 60%;
            height: auto;
            opacity: 0;
            animation: fadeIn 3s ease-in forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 0.7;
            }
        }
        body {
            margin: 0;
            height: 100vh;
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1 {
            color: red;
            font-size: 4rem;
        }
        .options {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
                
            opacity: 0;
            animation: showOptions 1s ease-in 3s forwards;
        }
        @keyframes showOptions {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .options a {
            display: block;
            padding: 1rem 2rem;
            background-color: #222;
            color: red;
            text-decoration: none;
            font-size: 1.5rem;
            border: 2px solid grey;
            border-radius: 8px;
            transition: background-color 0.3s;
        }
        .options a:hover {
            background-color: #550000;
        }
    </style>
</head>
<body>
    <img src="assets/pictures/WingmanGun.png" alt="Wingman with a gun">
    
    <div class="options">
        <a href="index.html">DREH UM</a>
        <a href="index.html">DREH UM</a>
    </div>
</body>
</html>
